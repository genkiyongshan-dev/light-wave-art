<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WAVEFORM MONITOR</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap');
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#0d0d0d;overflow:hidden;height:100vh;width:100vw;font-family:'Space Mono',monospace}

  #startScreen{
    position:absolute;top:0;left:0;width:100%;height:100%;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    z-index:20;background:#0d0d0d;
  }
  #startBtn{
    background:transparent;border:1px solid rgba(255,255,255,0.3);
    color:#fff;font-family:'Space Mono',monospace;
    font-size:11px;letter-spacing:.35em;padding:16px 40px;cursor:pointer;
  }
  .sub{margin-top:10px;font-size:8px;letter-spacing:.3em;color:rgba(255,255,255,.2)}

  #app{display:none;width:100%;height:100%;flex-direction:column}

  /* Preview */
  #pvWrap{position:relative;flex:0 0 auto;height:30vh;background:#000;overflow:hidden}
  #video{width:100%;height:100%;object-fit:cover}
  .pvLabel{position:absolute;top:8px;left:12px;font-size:8px;letter-spacing:.3em;color:rgba(255,255,255,.35)}
  .rec{position:absolute;top:11px;left:8px;width:5px;height:5px;border-radius:50%;background:#f02020;animation:blink 1.4s ease-in-out infinite}
  @keyframes blink{0%,100%{opacity:1}50%{opacity:.1}}

  /* Scope */
  #scope{flex:1;position:relative;background:#0d0d0d;overflow:hidden}

  .hdr{
    position:absolute;top:0;left:0;right:0;height:26px;
    background:#1a1a1a;border-bottom:1px solid rgba(255,255,255,.07);
    display:flex;align-items:center;padding:0 10px;z-index:5;
  }
  .hdrTitle{font-size:8px;letter-spacing:.28em;color:rgba(255,255,255,.45)}
  .modes{margin-left:auto;display:flex;gap:4px}
  .mb{
    background:transparent;border:none;
    color:rgba(255,255,255,.22);font-family:'Space Mono',monospace;
    font-size:8px;letter-spacing:.28em;cursor:pointer;
    padding:2px 8px;text-transform:uppercase;border-radius:2px;
  }
  .mb.on{color:rgba(255,255,255,.85);background:rgba(255,255,255,.09)}

  #gc,#wc{position:absolute;top:26px;left:0}

  .yAxis{position:absolute;top:26px;left:0;width:34px;pointer-events:none}
  .yL{position:absolute;right:4px;font-size:7px;color:rgba(255,255,255,.28);transform:translateY(-50%)}

  .ftr{
    position:absolute;bottom:0;left:0;right:0;height:18px;
    display:flex;align-items:center;padding:0 10px;
    border-top:1px solid rgba(255,255,255,.05);
  }
  .ftrL{font-size:7px;letter-spacing:.3em;color:rgba(255,255,255,.18)}
  .ftrR{margin-left:auto;font-size:7px;letter-spacing:.2em;color:rgba(255,255,255,.12)}
</style>
</head>
<body>

<div id="startScreen">
  <button id="startBtn">▶ START WAVEFORM</button>
  <div class="sub">FCP · RGB OVERLAY WAVEFORM MONITOR</div>
</div>

<div id="app">
  <div id="pvWrap">
    <video id="video" autoplay playsinline muted></video>
    <div class="rec"></div>
    <div class="pvLabel">CAMERA INPUT</div>
  </div>
  <div id="scope">
    <div class="hdr">
      <span class="hdrTitle" id="hdrTitle">RGB OVERLAY</span>
      <div class="modes">
        <button class="mb" data-m="luma">LUMA</button>
        <button class="mb on" data-m="rgb">RGB</button>
        <button class="mb" data-m="color">COLOR</button>
      </div>
    </div>
    <canvas id="gc"></canvas>
    <canvas id="wc"></canvas>
    <div class="yAxis" id="yAxis"></div>
    <div class="ftr">
      <span class="ftrL">Rec. 709</span>
      <span class="ftrR" id="fps"></span>
    </div>
  </div>
</div>

<canvas id="ac" style="display:none"></canvas>

<script>
const video = document.getElementById('video');
const ac = document.getElementById('ac');
const gc = document.getElementById('gc');
const wc = document.getElementById('wc');
const gx = gc.getContext('2d');
const wx = wc.getContext('2d');
const ax = ac.getContext('2d', {willReadFrequently:true});

// ── Analysis resolution
// AW = number of columns (= horizontal resolution of waveform)
// AH = number of rows scanned per column (vertical sample count)
const AW = 320, AH = 240;
ac.width = AW; ac.height = AH;

let mode = 'rgb';
let running = false;
let lastT = performance.now();

// Raw pixel stores — filled each frame from camera
const pxR = new Uint8Array(AW * AH);
const pxG = new Uint8Array(AW * AH);
const pxB = new Uint8Array(AW * AH);
const pxL = new Uint8Array(AW * AH);

// Persistence buffer — accumulated waveform (additive, fades each frame)
// Stored as float32 per output pixel, separate for R G B
let persR, persG, persB;

const PAD_T = 6, PAD_B = 22, PAD_L = 34, PAD_R = 4;
const HDR = 26;

function scopeW(){ return document.getElementById('scope').clientWidth }
function scopeH(){ return document.getElementById('scope').clientHeight - HDR }

function resize(){
  const W = scopeW(), H = scopeH();
  gc.width=W; gc.height=H;
  wc.width=W; wc.height=H;
  persR = new Float32Array(W * H);
  persG = new Float32Array(W * H);
  persB = new Float32Array(W * H);
  buildYAxis(H);
  drawGrid(W, H);
}

function buildYAxis(H){
  const el = document.getElementById('yAxis');
  el.innerHTML = '';
  const pH = H - PAD_T - PAD_B;
  [100,75,50,25,0].forEach(v=>{
    const d = document.createElement('div');
    d.className='yL'; d.textContent=v;
    d.style.top = (PAD_T + (1-v/100)*pH)+'px';
    el.appendChild(d);
  });
}

function drawGrid(W, H){
  gx.clearRect(0,0,W,H);
  const pH = H - PAD_T - PAD_B;
  gx.lineWidth=1;
  [0,25,50,75,100].forEach(v=>{
    const y = PAD_T + (1-v/100)*pH;
    gx.strokeStyle = (v===0||v===100) ? 'rgba(255,255,255,.1)' : 'rgba(255,255,255,.05)';
    gx.beginPath(); gx.moveTo(PAD_L,y); gx.lineTo(W-PAD_R,y); gx.stroke();
  });
  // IRE 109 clip line
  const yClip = PAD_T - pH*0.09;
  if(yClip > 0){
    gx.strokeStyle='rgba(255,80,80,.15)';
    gx.setLineDash([3,3]);
    gx.beginPath(); gx.moveTo(PAD_L,yClip); gx.lineTo(W-PAD_R,yClip); gx.stroke();
    gx.setLineDash([]);
  }
}

// ── Analyze: read camera pixels into typed arrays
function analyze(){
  ax.drawImage(video, 0, 0, AW, AH);
  const d = ax.getImageData(0,0,AW,AH).data;
  for(let i=0; i<AW*AH; i++){
    const b=i*4;
    pxR[i]=d[b]; pxG[i]=d[b+1]; pxB[i]=d[b+2];
    pxL[i] = (d[b]*299 + d[b+1]*587 + d[b+2]*114) / 1000 | 0;
  }
}

// ── Core FCP waveform algorithm:
// For each output column x:
//   For each source row y in that column:
//     Map pixel value (0-255) → output Y coordinate
//     Accumulate brightness at that (outX, outY) position
// Then render accumulated buffer with additive blending → density = brightness
function drawScope(){
  const W = wc.width, H = wc.height;
  const pH = H - PAD_T - PAD_B;
  const pW = W - PAD_L - PAD_R;

  // ── 1. Decay persistence buffers (creates the "trails/glow" effect)
  const DECAY = 0.82; // higher = longer trails
  for(let i=0; i<W*H; i++){
    persR[i] *= DECAY;
    persG[i] *= DECAY;
    persB[i] *= DECAY;
  }

  // ── 2. Accumulate current frame into persistence buffers
  const scaleX = pW / (AW - 1);

  if(mode === 'luma'){
    for(let col=0; col<AW; col++){
      const outX = Math.round(PAD_L + col * scaleX);
      if(outX < 0 || outX >= W) continue;
      for(let row=0; row<AH; row++){
        const v = pxL[row*AW+col];
        const outY = Math.round(PAD_T + (1 - v/255) * pH);
        if(outY < 0 || outY >= H) continue;
        const idx = outY*W + outX;
        // Accumulate — each pixel adds a fixed amount
        persG[idx] += 18;
        persR[idx] += 10;
        persB[idx] += 6;
      }
    }
  } else if(mode === 'rgb'){
    for(let col=0; col<AW; col++){
      const outX = Math.round(PAD_L + col * scaleX);
      if(outX < 0 || outX >= W) continue;
      for(let row=0; row<AH; row++){
        const base = row*AW+col;
        const r = pxR[base], g = pxG[base], b = pxB[base];

        // R channel → plot at R value height, tinted red
        const yR = Math.round(PAD_T + (1 - r/255)*pH);
        if(yR>=0 && yR<H){ persR[yR*W+outX] += 20; }

        // G channel → plot at G value height, tinted green
        const yG = Math.round(PAD_T + (1 - g/255)*pH);
        if(yG>=0 && yG<H){ persG[yG*W+outX] += 20; }

        // B channel → plot at B value height, tinted blue
        const yB = Math.round(PAD_T + (1 - b/255)*pH);
        if(yB>=0 && yB<H){ persB[yB*W+outX] += 20; }
      }
    }
  } else { // color
    for(let col=0; col<AW; col++){
      const outX = Math.round(PAD_L + col * scaleX);
      if(outX < 0 || outX >= W) continue;
      for(let row=0; row<AH; row++){
        const base = row*AW+col;
        const r = pxR[base], g = pxG[base], b = pxB[base];
        const l = pxL[base];
        const outY = Math.round(PAD_T + (1 - l/255)*pH);
        if(outY < 0 || outY >= H) continue;
        const idx = outY*W+outX;
        // Plot at luma height but colored by actual pixel color
        persR[idx] += r * 0.1;
        persG[idx] += g * 0.1;
        persB[idx] += b * 0.1;
      }
    }
  }

  // ── 3. Render persistence buffers → ImageData (additive, clamped)
  const imgData = wx.createImageData(W, H);
  const buf = imgData.data;

  for(let i=0; i<W*H; i++){
    const b = i*4;
    buf[b]   = Math.min(255, persR[i]);
    buf[b+1] = Math.min(255, persG[i]);
    buf[b+2] = Math.min(255, persB[i]);
    buf[b+3] = 255;
  }

  wx.putImageData(imgData, 0, 0);
}

// ── Mode buttons
document.querySelectorAll('.mb').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.mb').forEach(b=>b.classList.remove('on'));
    btn.classList.add('on');
    mode = btn.dataset.m;
    const titles = {luma:'LUMA',rgb:'RGB OVERLAY',color:'COLOR'};
    document.getElementById('hdrTitle').textContent = titles[mode];
    // Clear persistence
    persR.fill(0); persG.fill(0); persB.fill(0);
  });
});

// ── Start camera
document.getElementById('startBtn').addEventListener('click', async ()=>{
  try{
    const stream = await navigator.mediaDevices.getUserMedia({
      video:{facingMode:{ideal:'environment'},width:{ideal:1280},height:{ideal:720}},
      audio:false
    });
    video.srcObject = stream;
    video.onloadedmetadata = ()=>{
      video.play().then(()=>{
        document.getElementById('startScreen').style.display='none';
        document.getElementById('app').style.display='flex';
        setTimeout(()=>{ resize(); running=true; requestAnimationFrame(loop); }, 150);
      });
    };
  } catch(e){
    document.querySelector('.sub').textContent='カメラを許可してください';
  }
});

window.addEventListener('resize', resize);

function loop(){
  if(!running) return;
  const now = performance.now();
  document.getElementById('fps').textContent = Math.round(1000/(now-lastT))+' FPS';
  lastT = now;
  if(video.readyState >= 2){ analyze(); drawScope(); }
  requestAnimationFrame(loop);
}
</script>
</body>
</html>
