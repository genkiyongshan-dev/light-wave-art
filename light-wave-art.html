<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WAVEFORM MONITOR</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap');
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background:#0a0a0a;
    overflow:hidden;
    height:100vh; width:100vw;
    font-family:'Space Mono',monospace;
    color:rgba(255,255,255,0.6);
  }

  #startScreen {
    position:absolute; top:0; left:0; width:100%; height:100%;
    display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    z-index:20; background:#0a0a0a;
  }
  #startBtn {
    background:transparent;
    border:1px solid rgba(255,255,255,0.35);
    color:white; font-family:'Space Mono',monospace;
    font-size:12px; letter-spacing:0.35em;
    padding:18px 44px; cursor:pointer;
  }
  .start-sub {
    margin-top:12px; font-size:9px;
    letter-spacing:0.25em; color:rgba(255,255,255,0.25);
  }

  #appScreen {
    display:none;
    width:100%; height:100%;
    flex-direction:column;
  }

  /* Top: camera preview */
  #previewWrap {
    position:relative;
    flex:0 0 auto;
    height:32vh;
    background:#000;
    overflow:hidden;
  }
  #video {
    width:100%; height:100%;
    object-fit:cover;
  }
  .preview-label {
    position:absolute; top:8px; left:10px;
    font-size:8px; letter-spacing:0.3em;
    color:rgba(255,255,255,0.4);
  }

  /* Bottom: waveform scope */
  #scopeWrap {
    flex:1;
    position:relative;
    background:#111;
    overflow:hidden;
  }

  /* Grid lines */
  #gridCanvas {
    position:absolute; top:0; left:0;
    width:100%; height:100%;
    pointer-events:none;
  }

  /* Waveform */
  #waveCanvas {
    position:absolute; top:0; left:0;
    width:100%; height:100%;
  }

  /* Y-axis labels */
  .y-labels {
    position:absolute; top:0; left:0;
    height:100%; width:32px;
    pointer-events:none;
  }
  .y-label {
    position:absolute; right:4px;
    font-size:8px; color:rgba(255,255,255,0.3);
    transform:translateY(-50%);
    letter-spacing:0;
  }

  /* Bottom bar */
  .scope-footer {
    position:absolute; bottom:0; left:0; right:0;
    height:22px;
    display:flex; align-items:center;
    padding:0 36px 0 36px;
    border-top:1px solid rgba(255,255,255,0.06);
  }
  .scope-title {
    font-size:8px; letter-spacing:0.35em;
    color:rgba(255,255,255,0.3);
  }
  .scope-mode {
    margin-left:auto;
    font-size:8px; letter-spacing:0.3em;
    color:rgba(255,255,255,0.2);
  }

  /* Mode toggle */
  .mode-row {
    position:absolute; top:8px; right:10px;
    display:flex; gap:10px;
  }
  .mb {
    background:transparent; border:none;
    color:rgba(255,255,255,0.2); font-family:'Space Mono',monospace;
    font-size:8px; letter-spacing:0.3em; cursor:pointer;
    padding:2px 0; text-transform:uppercase;
    border-bottom:1px solid transparent;
  }
  .mb.active { color:rgba(255,255,255,0.75); border-bottom-color:rgba(255,255,255,0.4); }

  /* Rec dot */
  .rec {
    position:absolute; top:10px; left:10px;
    width:5px; height:5px; border-radius:50%;
    background:#ff2020;
    animation:blink 1.5s ease-in-out infinite;
  }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.15} }
</style>
</head>
<body>

<div id="startScreen">
  <button id="startBtn">▶ START WAVEFORM</button>
  <div class="start-sub">カメラの映像を波形モニターで可視化</div>
</div>

<div id="appScreen">
  <!-- Camera preview -->
  <div id="previewWrap">
    <video id="video" autoplay playsinline muted></video>
    <div class="preview-label">CAMERA INPUT</div>
    <div class="rec"></div>
  </div>

  <!-- Waveform scope -->
  <div id="scopeWrap">
    <canvas id="gridCanvas"></canvas>
    <canvas id="waveCanvas"></canvas>

    <div class="y-labels" id="yLabels"></div>

    <div class="mode-row">
      <button class="mb active" data-mode="luma">LUMA</button>
      <button class="mb" data-mode="rgb">RGB</button>
      <button class="mb" data-mode="color">COLOR</button>
    </div>

    <div class="scope-footer">
      <span class="scope-title">WAVEFORM MONITOR</span>
      <span class="scope-mode" id="modeLabel">LUMA</span>
    </div>
  </div>
</div>

<!-- Hidden analysis canvas -->
<canvas id="analyzeCanvas" style="display:none"></canvas>

<script>
const video = document.getElementById('video');
const analyzeCanvas = document.getElementById('analyzeCanvas');
const gridCanvas = document.getElementById('gridCanvas');
const waveCanvas = document.getElementById('waveCanvas');
const gCtx = gridCanvas.getContext('2d');
const wCtx = waveCanvas.getContext('2d');
const aCtx = analyzeCanvas.getContext('2d');

// Analysis resolution
const AW = 120, AH = 80;
analyzeCanvas.width = AW;
analyzeCanvas.height = AH;

let mode = 'luma';
let running = false;

// Smoothed data per column: luma + r,g,b
let smoothL = new Array(AW).fill(0);
let smoothR = new Array(AW).fill(0);
let smoothG = new Array(AW).fill(0);
let smoothB = new Array(AW).fill(0);

// For "color" mode: full distribution per column (histogram)
// Store top 3 luma samples per column
let colSamples = Array.from({length: AW}, () => []);

function resizeCanvases() {
  const scope = document.getElementById('scopeWrap');
  const rect = scope.getBoundingClientRect();
  const W = rect.width, H = rect.height;

  gridCanvas.width = W; gridCanvas.height = H;
  waveCanvas.width = W; waveCanvas.height = H;

  buildYLabels(H);
  drawGrid(W, H);
}

function buildYLabels(H) {
  const container = document.getElementById('yLabels');
  container.innerHTML = '';
  const levels = [100, 75, 50, 25, 0];
  const PAD_TOP = 10, PAD_BOT = 28;
  const plotH = H - PAD_TOP - PAD_BOT;

  levels.forEach(v => {
    const el = document.createElement('div');
    el.className = 'y-label';
    el.textContent = v;
    const pct = 1 - v / 100;
    el.style.top = (PAD_TOP + pct * plotH) + 'px';
    container.appendChild(el);
  });
}

function drawGrid(W, H) {
  gCtx.clearRect(0, 0, W, H);
  const PAD_TOP = 10, PAD_BOT = 28, PAD_L = 32, PAD_R = 8;
  const plotH = H - PAD_TOP - PAD_BOT;

  gCtx.strokeStyle = 'rgba(255,255,255,0.06)';
  gCtx.lineWidth = 1;

  // Horizontal grid lines at 0, 25, 50, 75, 100
  [0, 25, 50, 75, 100].forEach(v => {
    const y = PAD_TOP + (1 - v / 100) * plotH;
    gCtx.beginPath();
    gCtx.moveTo(PAD_L, y);
    gCtx.lineTo(W - PAD_R, y);
    gCtx.stroke();
  });

  // 100 line slightly brighter
  gCtx.strokeStyle = 'rgba(255,255,255,0.12)';
  const y100 = PAD_TOP;
  gCtx.beginPath();
  gCtx.moveTo(PAD_L, y100);
  gCtx.lineTo(W - PAD_R, y100);
  gCtx.stroke();
}

// ---- Analysis ----
function analyze() {
  aCtx.drawImage(video, 0, 0, AW, AH);
  const data = aCtx.getImageData(0, 0, AW, AH).data;

  const newL = new Array(AW).fill(0);
  const newR = new Array(AW).fill(0);
  const newG = new Array(AW).fill(0);
  const newB = new Array(AW).fill(0);
  const newSamples = Array.from({length: AW}, () => []);

  for (let x = 0; x < AW; x++) {
    let sumL = 0, sumR = 0, sumG = 0, sumB = 0;
    for (let y = 0; y < AH; y++) {
      const i = (y * AW + x) * 4;
      const r = data[i], g = data[i+1], b = data[i+2];
      const lum = r * 0.299 + g * 0.587 + b * 0.114;
      sumL += lum; sumR += r; sumG += g; sumB += b;
      // Store sample for color mode
      newSamples[x].push({ lum: lum / 255, r, g, b });
    }
    newL[x] = sumL / AH;
    newR[x] = sumR / AH;
    newG[x] = sumG / AH;
    newB[x] = sumB / AH;
  }

  // Smooth
  const s = 0.72;
  for (let x = 0; x < AW; x++) {
    smoothL[x] = smoothL[x] * s + newL[x] * (1 - s);
    smoothR[x] = smoothR[x] * s + newR[x] * (1 - s);
    smoothG[x] = smoothG[x] * s + newG[x] * (1 - s);
    smoothB[x] = smoothB[x] * s + newB[x] * (1 - s);
    colSamples[x] = newSamples[x];
  }
}

// ---- Draw waveform ----
function drawScope() {
  const W = waveCanvas.width, H = waveCanvas.height;
  const PAD_TOP = 10, PAD_BOT = 28, PAD_L = 32, PAD_R = 8;
  const plotW = W - PAD_L - PAD_R;
  const plotH = H - PAD_TOP - PAD_BOT;

  // Fade — gives the "streaky" trail effect like FCP
  wCtx.fillStyle = 'rgba(17,17,17,0.35)';
  wCtx.fillRect(0, 0, W, H);

  function lumToY(v) {
    // v in 0-255 → y in plot
    return PAD_TOP + (1 - v / 255) * plotH;
  }
  function colToX(i) {
    return PAD_L + (i / (AW - 1)) * plotW;
  }

  if (mode === 'luma') {
    // Draw each column as a vertical scatter of dots (like FCP waveform)
    for (let x = 0; x < AW; x++) {
      const px = colToX(x);
      const samples = colSamples[x];
      if (!samples) continue;

      for (let s of samples) {
        const py = lumToY(s.lum * 255);
        const alpha = 0.15 + s.lum * 0.5;
        wCtx.beginPath();
        wCtx.arc(px, py, 0.7, 0, Math.PI * 2);
        wCtx.fillStyle = `rgba(220,235,210,${alpha})`;
        wCtx.fill();
      }

      // Bright line for average
      const avgY = lumToY(smoothL[x]);
      wCtx.beginPath();
      wCtx.arc(px, avgY, 0.9, 0, Math.PI * 2);
      wCtx.fillStyle = 'rgba(255,255,255,0.85)';
      wCtx.fill();
    }

  } else if (mode === 'rgb') {
    // Three separate waveforms: R=red, G=green, B=blue
    const channels = [
      { data: smoothR, color: 'rgba(255,80,80,' },
      { data: smoothG, color: 'rgba(80,220,100,' },
      { data: smoothB, color: 'rgba(80,140,255,' },
    ];
    for (const ch of channels) {
      wCtx.beginPath();
      for (let x = 0; x < AW; x++) {
        const px = colToX(x);
        const py = lumToY(ch.data[x]);
        if (x === 0) wCtx.moveTo(px, py);
        else {
          const ppx = colToX(x - 1);
          const ppy = lumToY(ch.data[x - 1]);
          wCtx.quadraticCurveTo(ppx, ppy, (ppx + px) / 2, (ppy + py) / 2);
        }
      }
      wCtx.strokeStyle = ch.color + '0.7)';
      wCtx.lineWidth = 1;
      wCtx.stroke();

      // Glow pass
      wCtx.beginPath();
      for (let x = 0; x < AW; x++) {
        const px = colToX(x);
        const py = lumToY(ch.data[x]);
        if (x === 0) wCtx.moveTo(px, py);
        else {
          const ppx = colToX(x - 1);
          const ppy = lumToY(ch.data[x - 1]);
          wCtx.quadraticCurveTo(ppx, ppy, (ppx + px) / 2, (ppy + py) / 2);
        }
      }
      wCtx.strokeStyle = ch.color + '0.2)';
      wCtx.lineWidth = 3;
      wCtx.stroke();

    }

  } else if (mode === 'color') {
    // Each pixel dot colored by actual camera color — like FCP color waveform
    for (let x = 0; x < AW; x++) {
      const px = colToX(x);
      const samples = colSamples[x];
      if (!samples) continue;

      for (let s of samples) {
        const py = lumToY(s.lum * 255);
        const alpha = 0.2 + s.lum * 0.55;
        wCtx.beginPath();
        wCtx.arc(px, py, 0.9, 0, Math.PI * 2);
        wCtx.fillStyle = `rgba(${s.r},${s.g},${s.b},${alpha})`;
        wCtx.fill();
      }
    }
  }
}

// ---- Mode toggle ----
document.querySelectorAll('.mb').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.mb').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    mode = btn.dataset.mode;
    document.getElementById('modeLabel').textContent = btn.dataset.mode.toUpperCase();
    wCtx.clearRect(0, 0, waveCanvas.width, waveCanvas.height);
  });
});

// ---- Start ----
document.getElementById('startBtn').addEventListener('click', async () => {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: { ideal: 'environment' }, width: { ideal: 640 }, height: { ideal: 480 } },
      audio: false
    });
    video.srcObject = stream;
    video.onloadedmetadata = () => {
      video.play().then(() => {
        document.getElementById('startScreen').style.display = 'none';
        document.getElementById('appScreen').style.display = 'flex';
        setTimeout(() => {
          resizeCanvases();
          running = true;
          requestAnimationFrame(loop);
        }, 100);
      });
    };
  } catch(e) {
    document.querySelector('.start-sub').textContent = 'カメラを許可してください';
  }
});

window.addEventListener('resize', () => {
  resizeCanvases();
});

function loop() {
  if (!running) return;
  try {
    if (video.readyState >= 2) {
      analyze();
      drawScope();
    }
  } catch(e) { console.error(e); }
  requestAnimationFrame(loop);
}
</script>
</body>
</html>
