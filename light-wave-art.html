<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WAVEFORM MONITOR</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap');
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background:#0a0a0a; overflow:hidden;
    height:100vh; width:100vw;
    font-family:'Space Mono',monospace;
  }

  #startScreen {
    position:absolute; top:0; left:0; width:100%; height:100%;
    display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    z-index:20; background:#0a0a0a;
  }
  #startBtn {
    background:transparent; border:1px solid rgba(255,255,255,0.35);
    color:white; font-family:'Space Mono',monospace;
    font-size:12px; letter-spacing:0.35em;
    padding:18px 44px; cursor:pointer;
  }
  .start-sub {
    margin-top:12px; font-size:9px;
    letter-spacing:0.25em; color:rgba(255,255,255,0.25);
  }

  #appScreen {
    display:none; width:100%; height:100%; flex-direction:column;
  }

  #previewWrap {
    position:relative; flex:0 0 auto;
    height:32vh; background:#000; overflow:hidden;
  }
  #video { width:100%; height:100%; object-fit:cover; }
  .preview-label {
    position:absolute; top:8px; left:18px;
    font-size:8px; letter-spacing:0.3em; color:rgba(255,255,255,0.4);
  }
  .rec {
    position:absolute; top:10px; left:8px;
    width:5px; height:5px; border-radius:50%;
    background:#ff2020; animation:blink 1.5s ease-in-out infinite;
  }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.15} }

  #scopeWrap {
    flex:1; position:relative; background:#0e0e0e; overflow:hidden;
  }
  #gridCanvas { position:absolute; top:0; left:0; width:100%; height:100%; pointer-events:none; }
  #waveCanvas { position:absolute; top:0; left:0; width:100%; height:100%; }

  .y-labels {
    position:absolute; top:0; left:0; height:100%; width:32px; pointer-events:none;
  }
  .y-label {
    position:absolute; right:4px; font-size:8px;
    color:rgba(255,255,255,0.28); transform:translateY(-50%);
  }

  .mode-row {
    position:absolute; top:8px; right:10px; display:flex; gap:10px;
  }
  .mb {
    background:transparent; border:none;
    color:rgba(255,255,255,0.2); font-family:'Space Mono',monospace;
    font-size:8px; letter-spacing:0.3em; cursor:pointer;
    padding:2px 0; text-transform:uppercase;
    border-bottom:1px solid transparent;
  }
  .mb.active { color:rgba(255,255,255,0.75); border-bottom-color:rgba(255,255,255,0.4); }

  .scope-footer {
    position:absolute; bottom:0; left:0; right:0; height:22px;
    display:flex; align-items:center; padding:0 36px;
    border-top:1px solid rgba(255,255,255,0.06);
  }
  .scope-title { font-size:8px; letter-spacing:0.35em; color:rgba(255,255,255,0.25); }
  .scope-mode { margin-left:auto; font-size:8px; letter-spacing:0.3em; color:rgba(255,255,255,0.18); }

  #fpsLabel {
    position:absolute; bottom:26px; right:10px;
    font-size:7px; letter-spacing:0.2em; color:rgba(255,255,255,0.15);
  }
</style>
</head>
<body>

<div id="startScreen">
  <button id="startBtn">▶ START WAVEFORM</button>
  <div class="start-sub">カメラの映像を波形モニターで可視化</div>
</div>

<div id="appScreen">
  <div id="previewWrap">
    <video id="video" autoplay playsinline muted></video>
    <div class="rec"></div>
    <div class="preview-label">CAMERA INPUT</div>
  </div>
  <div id="scopeWrap">
    <canvas id="gridCanvas"></canvas>
    <canvas id="waveCanvas"></canvas>
    <div class="y-labels" id="yLabels"></div>
    <div class="mode-row">
      <button class="mb active" data-mode="luma">LUMA</button>
      <button class="mb" data-mode="rgb">RGB</button>
      <button class="mb" data-mode="color">COLOR</button>
    </div>
    <div class="scope-footer">
      <span class="scope-title">WAVEFORM MONITOR</span>
      <span class="scope-mode" id="modeLabel">LUMA</span>
    </div>
    <div id="fpsLabel"></div>
  </div>
</div>

<canvas id="analyzeCanvas" style="display:none"></canvas>

<script>
const video = document.getElementById('video');
const analyzeCanvas = document.getElementById('analyzeCanvas');
const gridCanvas = document.getElementById('gridCanvas');
const waveCanvas = document.getElementById('waveCanvas');
const gCtx = gridCanvas.getContext('2d');
const wCtx = waveCanvas.getContext('2d');
const aCtx = analyzeCanvas.getContext('2d');

// 10x density: AW=320, AH=240 → 320×240 = 76,800 samples (was ~24,000)
const AW = 320, AH = 240;
analyzeCanvas.width = AW;
analyzeCanvas.height = AH;

let mode = 'luma';
let running = false;

let smoothL = new Float32Array(AW);
let smoothR = new Float32Array(AW);
let smoothG = new Float32Array(AW);
let smoothB = new Float32Array(AW);

// Store raw pixel data — reuse typed arrays for speed
let rawData = null;
let colSamples = Array.from({length: AW}, () => new Float32Array(AH * 4)); // lum,r,g,b per row

const PAD_TOP = 10, PAD_BOT = 26, PAD_L = 32, PAD_R = 6;

// FPS tracking
let lastTime = performance.now();
let fps = 60;

function resizeCanvases() {
  const scope = document.getElementById('scopeWrap');
  const W = scope.clientWidth, H = scope.clientHeight;
  gridCanvas.width = W; gridCanvas.height = H;
  waveCanvas.width = W; waveCanvas.height = H;
  buildYLabels(H);
  drawGrid(W, H);
}

function buildYLabels(H) {
  const c = document.getElementById('yLabels');
  c.innerHTML = '';
  const plotH = H - PAD_TOP - PAD_BOT;
  [100, 75, 50, 25, 0].forEach(v => {
    const el = document.createElement('div');
    el.className = 'y-label';
    el.textContent = v;
    el.style.top = (PAD_TOP + (1 - v / 100) * plotH) + 'px';
    c.appendChild(el);
  });
}

function drawGrid(W, H) {
  gCtx.clearRect(0, 0, W, H);
  const plotH = H - PAD_TOP - PAD_BOT;
  gCtx.lineWidth = 1;
  [0, 25, 50, 75, 100].forEach(v => {
    const y = PAD_TOP + (1 - v / 100) * plotH;
    gCtx.strokeStyle = v === 100 ? 'rgba(255,255,255,0.1)' : 'rgba(255,255,255,0.05)';
    gCtx.beginPath();
    gCtx.moveTo(PAD_L, y); gCtx.lineTo(W - PAD_R, y);
    gCtx.stroke();
  });
}

// ---- Analyze ----
function analyze() {
  aCtx.drawImage(video, 0, 0, AW, AH);
  const imgData = aCtx.getImageData(0, 0, AW, AH);
  rawData = imgData.data;

  const s = 0.65;
  for (let x = 0; x < AW; x++) {
    let sL = 0, sR = 0, sG = 0, sB = 0;
    const col = colSamples[x];
    for (let y = 0; y < AH; y++) {
      const i = (y * AW + x) * 4;
      const r = rawData[i], g = rawData[i+1], b = rawData[i+2];
      const lum = r * 0.299 + g * 0.587 + b * 0.114;
      sL += lum; sR += r; sG += g; sB += b;
      const j = y * 4;
      col[j]   = lum;
      col[j+1] = r;
      col[j+2] = g;
      col[j+3] = b;
    }
    smoothL[x] = smoothL[x] * s + (sL / AH) * (1 - s);
    smoothR[x] = smoothR[x] * s + (sR / AH) * (1 - s);
    smoothG[x] = smoothG[x] * s + (sG / AH) * (1 - s);
    smoothB[x] = smoothB[x] * s + (sB / AH) * (1 - s);
  }
}

// ---- Draw — use ImageData for maximum speed ----
function drawScope() {
  const W = waveCanvas.width, H = waveCanvas.height;
  const plotW = W - PAD_L - PAD_R;
  const plotH = H - PAD_TOP - PAD_BOT;

  // Fade
  wCtx.fillStyle = 'rgba(14,14,14,0.28)';
  wCtx.fillRect(0, 0, W, H);

  // Use ImageData for ultra-fast per-pixel drawing
  const imgData = wCtx.getImageData(0, 0, W, H);
  const buf = imgData.data;

  function setPixel(px, py, r, g, b, a) {
    const ix = Math.round(px), iy = Math.round(py);
    if (ix < 0 || ix >= W || iy < 0 || iy >= H) return;
    const idx = (iy * W + ix) * 4;
    // Additive blend
    buf[idx]   = Math.min(255, buf[idx]   + r * a);
    buf[idx+1] = Math.min(255, buf[idx+1] + g * a);
    buf[idx+2] = Math.min(255, buf[idx+2] + b * a);
    buf[idx+3] = 255;
  }

  const scaleX = plotW / (AW - 1);
  const scaleY = plotH / 255;

  if (mode === 'luma') {
    for (let x = 0; x < AW; x++) {
      const px = PAD_L + x * scaleX;
      const col = colSamples[x];
      for (let y = 0; y < AH; y++) {
        const lum = col[y * 4];
        const py = PAD_TOP + (1 - lum / 255) * plotH;
        const a = Math.round(18 + (lum / 255) * 55);
        setPixel(px, py, 210, 230, 200, a);
      }
      // Bright average
      const avgY = PAD_TOP + (1 - smoothL[x] / 255) * plotH;
      setPixel(px, avgY, 255, 255, 255, 200);
      setPixel(px, avgY - 1, 255, 255, 255, 80);
    }

  } else if (mode === 'rgb') {
    for (let x = 0; x < AW; x++) {
      const px = PAD_L + x * scaleX;
      const col = colSamples[x];
      for (let y = 0; y < AH; y++) {
        const j = y * 4;
        const rv = col[j+1], gv = col[j+2], bv = col[j+3];

        const rY = PAD_TOP + (1 - rv / 255) * plotH;
        const gY = PAD_TOP + (1 - gv / 255) * plotH;
        const bY = PAD_TOP + (1 - bv / 255) * plotH;

        setPixel(px, rY, 255, 60, 60,  Math.round(12 + (rv/255)*40));
        setPixel(px, gY, 60,  220, 80, Math.round(12 + (gv/255)*40));
        setPixel(px, bY, 70,  130, 255,Math.round(12 + (bv/255)*40));
      }
      // Bright averages
      setPixel(px, PAD_TOP + (1 - smoothR[x]/255)*plotH, 255, 80, 80, 200);
      setPixel(px, PAD_TOP + (1 - smoothG[x]/255)*plotH, 80, 255, 100, 200);
      setPixel(px, PAD_TOP + (1 - smoothB[x]/255)*plotH, 100, 150, 255, 200);
    }

  } else if (mode === 'color') {
    for (let x = 0; x < AW; x++) {
      const px = PAD_L + x * scaleX;
      const col = colSamples[x];
      for (let y = 0; y < AH; y++) {
        const j = y * 4;
        const lum = col[j];
        const py = PAD_TOP + (1 - lum / 255) * plotH;
        const a = Math.round(20 + (lum / 255) * 65);
        setPixel(px, py, col[j+1], col[j+2], col[j+3], a);
      }
    }
  }

  wCtx.putImageData(imgData, 0, 0);
}

// ---- Mode toggle ----
document.querySelectorAll('.mb').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.mb').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    mode = btn.dataset.mode;
    document.getElementById('modeLabel').textContent = btn.dataset.mode.toUpperCase();
    wCtx.clearRect(0, 0, waveCanvas.width, waveCanvas.height);
  });
});

// ---- Start ----
document.getElementById('startBtn').addEventListener('click', async () => {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: { ideal: 'environment' }, width: { ideal: 1280 }, height: { ideal: 720 } },
      audio: false
    });
    video.srcObject = stream;
    video.onloadedmetadata = () => {
      video.play().then(() => {
        document.getElementById('startScreen').style.display = 'none';
        document.getElementById('appScreen').style.display = 'flex';
        setTimeout(() => { resizeCanvases(); running = true; requestAnimationFrame(loop); }, 100);
      });
    };
  } catch(e) {
    document.querySelector('.start-sub').textContent = 'カメラを許可してください';
  }
});

window.addEventListener('resize', resizeCanvases);

function loop() {
  if (!running) return;

  // FPS
  const now = performance.now();
  fps = Math.round(1000 / (now - lastTime));
  lastTime = now;
  document.getElementById('fpsLabel').textContent = fps + ' FPS';

  try {
    if (video.readyState >= 2) { analyze(); drawScope(); }
  } catch(e) { console.error(e); }

  requestAnimationFrame(loop);
}
</script>
</body>
</html>
