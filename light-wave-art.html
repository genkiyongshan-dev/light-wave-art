<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WAVEFORM MONITOR</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap');
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#0d0d0d;overflow:hidden;height:100vh;width:100vw;font-family:'Space Mono',monospace}

  #startScreen{
    position:absolute;top:0;left:0;width:100%;height:100%;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    z-index:20;background:#0d0d0d;
  }
  #startBtn{
    background:transparent;border:1px solid rgba(255,255,255,0.3);
    color:#fff;font-family:'Space Mono',monospace;
    font-size:11px;letter-spacing:.35em;padding:16px 40px;cursor:pointer;
  }
  .sub{margin-top:10px;font-size:8px;letter-spacing:.3em;color:rgba(255,255,255,.2)}

  #app{display:none;width:100%;height:100%;flex-direction:column}

  #pvWrap{position:relative;flex:0 0 auto;height:30vh;background:#000;overflow:hidden}
  #video{width:100%;height:100%;object-fit:cover}
  .pvLabel{position:absolute;top:8px;left:12px;font-size:8px;letter-spacing:.3em;color:rgba(255,255,255,.35)}
  .rec{position:absolute;top:11px;left:8px;width:5px;height:5px;border-radius:50%;background:#f02020;animation:blink 1.4s ease-in-out infinite}
  @keyframes blink{0%,100%{opacity:1}50%{opacity:.1}}

  #scope{flex:1;position:relative;background:#0d0d0d;overflow:hidden}

  .hdr{
    position:absolute;top:0;left:0;right:0;height:26px;
    background:#1a1a1a;border-bottom:1px solid rgba(255,255,255,.07);
    display:flex;align-items:center;padding:0 10px;z-index:5;
  }
  .hdrTitle{font-size:8px;letter-spacing:.28em;color:rgba(255,255,255,.45)}
  .modes{margin-left:auto;display:flex;gap:4px}
  .mb{
    background:transparent;border:none;
    color:rgba(255,255,255,.22);font-family:'Space Mono',monospace;
    font-size:8px;letter-spacing:.28em;cursor:pointer;
    padding:2px 8px;text-transform:uppercase;border-radius:2px;
  }
  .mb.on{color:rgba(255,255,255,.85);background:rgba(255,255,255,.09)}

  /* wc is behind — blurred density render */
  /* oc is on top — grid overlay drawn with ctx (sharp) */
  #wc,#oc{position:absolute;top:26px;left:0}

  .yAxis{position:absolute;top:26px;left:0;width:34px;pointer-events:none;z-index:3}
  .yL{position:absolute;right:4px;font-size:7px;color:rgba(255,255,255,.28);transform:translateY(-50%)}

  .ftr{
    position:absolute;bottom:0;left:0;right:0;height:18px;
    display:flex;align-items:center;padding:0 10px;
    border-top:1px solid rgba(255,255,255,.05);z-index:3;
  }
  .ftrL{font-size:7px;letter-spacing:.3em;color:rgba(255,255,255,.18)}
  .ftrR{margin-left:auto;font-size:7px;letter-spacing:.2em;color:rgba(255,255,255,.12)}
</style>
</head>
<body>

<div id="startScreen">
  <button id="startBtn">▶ START WAVEFORM</button>
  <div class="sub">FCP · RGB OVERLAY WAVEFORM MONITOR</div>
</div>

<div id="app">
  <div id="pvWrap">
    <video id="video" autoplay playsinline muted></video>
    <div class="rec"></div>
    <div class="pvLabel">CAMERA INPUT</div>
  </div>
  <div id="scope">
    <div class="hdr">
      <span class="hdrTitle" id="hdrTitle">RGB OVERLAY</span>
      <div class="modes">
        <button class="mb" data-m="luma">LUMA</button>
        <button class="mb on" data-m="rgb">RGB</button>
        <button class="mb" data-m="color">COLOR</button>
      </div>
    </div>
    <!-- wc: density render (will be CSS-blurred) -->
    <canvas id="wc"></canvas>
    <!-- oc: sharp grid overlay -->
    <canvas id="oc"></canvas>
    <div class="yAxis" id="yAxis"></div>
    <div class="ftr">
      <span class="ftrL">Rec. 709</span>
      <span class="ftrR" id="fps"></span>
    </div>
  </div>
</div>

<canvas id="ac" style="display:none"></canvas>

<script>
const video = document.getElementById('video');
const ac  = document.getElementById('ac');
const wc  = document.getElementById('wc');  // density (blurred)
const oc  = document.getElementById('oc');  // grid overlay (sharp)
const wx  = wc.getContext('2d', {willReadFrequently:true});
const ox  = oc.getContext('2d');
const ax  = ac.getContext('2d', {willReadFrequently:true});

// Vertical sample count — more = smoother vertical density
const AH = 300;

let mode = 'rgb';
let running = false;
let lastT = performance.now();

const PAD_T = 8, PAD_B = 22, PAD_L = 34, PAD_R = 4;
const HDR = 26;

let W = 0, H = 0, pW = 0, pH = 0, AW = 1;
let pxR, pxG, pxB, pxL;
let densR, densG, densB;
let persR, persG, persB;
let buf;

function scopeW(){ return document.getElementById('scope').clientWidth }
function scopeH(){ return document.getElementById('scope').clientHeight - HDR }

function resize(){
  W = scopeW(); H = scopeH();
  pW = W - PAD_L - PAD_R;
  pH = H - PAD_T - PAD_B;

  // wc rendered at HALF resolution then CSS-scaled up 2x
  // This gives free bilinear interpolation = smoothing, no extra cost
  const RES = 0.5;
  const rW = Math.round(W * RES), rH = Math.round(H * RES);

  wc.width = rW; wc.height = rH;
  wc.style.width  = W + 'px';
  wc.style.height = H + 'px';
  // CSS filter blur — dissolves pixel grid into fog
  wc.style.filter = 'blur(1.2px)';
  wc.style.imageRendering = 'auto';

  oc.width = W; oc.height = H;
  oc.style.width  = W + 'px';
  oc.style.height = H + 'px';

  // AW = plot width at half-res (matches wc canvas width minus pads scaled)
  AW = Math.round(pW * RES);
  ac.width = AW; ac.height = AH;

  const sz = rW * rH;
  pxR  = new Uint8Array(AW * AH);
  pxG  = new Uint8Array(AW * AH);
  pxB  = new Uint8Array(AW * AH);
  pxL  = new Uint8Array(AW * AH);
  densR = new Float32Array(sz);
  densG = new Float32Array(sz);
  densB = new Float32Array(sz);
  persR = new Float32Array(sz);
  persG = new Float32Array(sz);
  persB = new Float32Array(sz);
  buf   = new Uint8ClampedArray(sz * 4);

  buildYAxis();
  drawGrid();
}

function buildYAxis(){
  const el = document.getElementById('yAxis');
  el.innerHTML = '';
  [100,75,50,25,0].forEach(v => {
    const d = document.createElement('div');
    d.className = 'yL'; d.textContent = v;
    d.style.top = (PAD_T + (1 - v/100) * pH) + 'px';
    el.appendChild(d);
  });
}

function drawGrid(){
  ox.clearRect(0, 0, W, H);
  ox.lineWidth = 1;
  [0,25,50,75,100].forEach(v => {
    const y = PAD_T + (1 - v/100) * pH;
    ox.strokeStyle = (v===0||v===100) ? 'rgba(255,255,255,.1)' : 'rgba(255,255,255,.05)';
    ox.beginPath(); ox.moveTo(PAD_L, y); ox.lineTo(W-PAD_R, y); ox.stroke();
  });
}

function analyze(){
  ax.drawImage(video, 0, 0, AW, AH);
  const d = ax.getImageData(0, 0, AW, AH).data;
  for(let i = 0; i < AW * AH; i++){
    const b = i * 4;
    pxR[i] = d[b];
    pxG[i] = d[b+1];
    pxB[i] = d[b+2];
    pxL[i] = (d[b]*299 + d[b+1]*587 + d[b+2]*114 + 500) / 1000 | 0;
  }
}

function buildDensity(){
  const rW = wc.width, rH = wc.height;
  const rpW = Math.round(pW * wc.width / W);
  const rpH = Math.round(pH * wc.height / H);
  const rPAD_L = Math.round(PAD_L * wc.width / W);
  const rPAD_T = Math.round(PAD_T * wc.height / H);

  densR.fill(0); densG.fill(0); densB.fill(0);

  for(let col = 0; col < AW; col++){
    const outX = rPAD_L + col; // 1:1 — no gaps
    if(outX < 0 || outX >= rW) continue;

    for(let row = 0; row < AH; row++){
      const idx = row * AW + col;

      if(mode === 'luma'){
        const v = pxL[idx];
        const outY = Math.round(rPAD_T + (1 - v/255) * rpH);
        if(outY >= 0 && outY < rH){
          const i = outY * rW + outX;
          densR[i] += 0.75; densG[i] += 1.0; densB[i] += 0.55;
        }

      } else if(mode === 'rgb'){
        const vR = pxR[idx];
        const yR = Math.round(rPAD_T + (1 - vR/255) * rpH);
        if(yR >= 0 && yR < rH) densR[yR * rW + outX] += 1.0;

        const vG = pxG[idx];
        const yG = Math.round(rPAD_T + (1 - vG/255) * rpH);
        if(yG >= 0 && yG < rH) densG[yG * rW + outX] += 1.0;

        const vB = pxB[idx];
        const yB = Math.round(rPAD_T + (1 - vB/255) * rpH);
        if(yB >= 0 && yB < rH) densB[yB * rW + outX] += 1.0;

      } else {
        const v = pxL[idx];
        const outY = Math.round(rPAD_T + (1 - v/255) * rpH);
        if(outY >= 0 && outY < rH){
          const i = outY * rW + outX;
          densR[i] += pxR[idx] / 255;
          densG[i] += pxG[idx] / 255;
          densB[i] += pxB[idx] / 255;
        }
      }
    }
  }
}

function drawScope(){
  const sz = wc.width * wc.height;
  const GAIN  = 180 / AH;
  const DECAY = 0.74;

  for(let i = 0; i < sz; i++){
    persR[i] = persR[i] * DECAY + densR[i] * GAIN;
    persG[i] = persG[i] * DECAY + densG[i] * GAIN;
    persB[i] = persB[i] * DECAY + densB[i] * GAIN;
    const b = i * 4;
    buf[b]   = persR[i] > 255 ? 255 : persR[i];
    buf[b+1] = persG[i] > 255 ? 255 : persG[i];
    buf[b+2] = persB[i] > 255 ? 255 : persB[i];
    buf[b+3] = 255;
  }
  wx.putImageData(new ImageData(buf, wc.width, wc.height), 0, 0);
}

document.querySelectorAll('.mb').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.mb').forEach(b => b.classList.remove('on'));
    btn.classList.add('on');
    mode = btn.dataset.m;
    const t = {luma:'LUMA', rgb:'RGB OVERLAY', color:'COLOR'};
    document.getElementById('hdrTitle').textContent = t[mode];
    persR.fill(0); persG.fill(0); persB.fill(0);
  });
});

document.getElementById('startBtn').addEventListener('click', async () => {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode:{ideal:'environment'}, width:{ideal:1920}, height:{ideal:1080} },
      audio: false
    });
    video.srcObject = stream;
    video.onloadedmetadata = () => {
      video.play().then(() => {
        document.getElementById('startScreen').style.display = 'none';
        document.getElementById('app').style.display = 'flex';
        setTimeout(() => { resize(); running = true; requestAnimationFrame(loop); }, 150);
      });
    };
  } catch(e) {
    document.querySelector('.sub').textContent = 'カメラを許可してください';
  }
});

window.addEventListener('resize', resize);

function loop(){
  if(!running) return;
  const now = performance.now();
  document.getElementById('fps').textContent = Math.round(1000/(now-lastT)) + ' FPS';
  lastT = now;
  if(video.readyState >= 2){ analyze(); buildDensity(); drawScope(); }
  requestAnimationFrame(loop);
}
</script>
</body>
</html>
