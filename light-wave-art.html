<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LIGHT WAVE — 光の波形アート</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400&family=Space+Mono:wght@400;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #000;
    color: #fff;
    font-family: 'Space Mono', monospace;
    overflow: hidden;
    height: 100vh;
    width: 100vw;
  }

  #main {
    position: relative;
    width: 100vw;
    height: 100vh;
  }

  #video {
    position: absolute;
    top: 0; left: 0;
    width: 160px;
    height: 120px;
    opacity: 0.001;
    pointer-events: none;
  }

  #analyzeCanvas {
    display: none;
  }

  #artCanvas {
    position: absolute;
    top: 0; left: 0;
    width: 100%;
    height: 100%;
  }

  #startBtn {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: transparent;
    border: 1px solid rgba(255,255,255,0.4);
    color: white;
    font-family: 'Space Mono', monospace;
    font-size: 13px;
    letter-spacing: 0.3em;
    padding: 20px 48px;
    cursor: pointer;
    z-index: 20;
    transition: all 0.3s ease;
  }
  #startBtn:hover { background: rgba(255,255,255,0.1); }
  #startBtn.hidden { display: none; }

  .mode-toggle {
    position: absolute;
    top: 28px;
    left: 24px;
    z-index: 10;
    display: none;
    gap: 16px;
  }
  .mode-btn {
    background: transparent;
    border: none;
    color: rgba(255,255,255,0.25);
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.3em;
    cursor: pointer;
    padding: 4px 0;
    text-transform: uppercase;
    border-bottom: 1px solid transparent;
    transition: color 0.2s;
  }
  .mode-btn.active {
    color: rgba(255,255,255,0.85);
    border-bottom-color: rgba(255,255,255,0.5);
  }

  .ui-bottom {
    position: absolute;
    bottom: 32px;
    left: 24px;
    z-index: 10;
    display: none;
  }
  .lux-label {
    font-size: 9px;
    letter-spacing: 0.4em;
    color: rgba(255,255,255,0.3);
    margin-bottom: 4px;
  }
  .lux-value {
    font-size: 32px;
    font-weight: 700;
    letter-spacing: -0.02em;
    line-height: 1;
  }
  .lux-unit {
    font-size: 9px;
    letter-spacing: 0.3em;
    color: rgba(255,255,255,0.2);
    margin-top: 2px;
  }

  .rec-dot {
    position: absolute;
    top: 34px;
    right: 24px;
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: #ff2222;
    z-index: 10;
    display: none;
    animation: blink 1.4s ease-in-out infinite;
  }
  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.1; }
  }

  #errorMsg {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    color: rgba(255,100,100,0.8);
    font-size: 11px;
    letter-spacing: 0.2em;
    text-align: center;
    display: none;
    z-index: 30;
    white-space: pre-line;
  }
</style>
</head>
<body>
<div id="main">
  <video id="video" autoplay playsinline muted></video>
  <canvas id="analyzeCanvas"></canvas>
  <canvas id="artCanvas"></canvas>

  <button id="startBtn">▶ CAMERA START</button>
  <div id="errorMsg"></div>

  <div class="mode-toggle" id="modeToggle">
    <button class="mode-btn active" data-mode="wave">WAVE</button>
    <button class="mode-btn" data-mode="mountain">MOUNTAIN</button>
    <button class="mode-btn" data-mode="scatter">SCATTER</button>
  </div>

  <div class="rec-dot" id="recDot"></div>

  <div class="ui-bottom" id="uiBottom">
    <div class="lux-label">LIGHT INTENSITY</div>
    <div class="lux-value" id="luxValue">000</div>
    <div class="lux-unit">LUMINANCE</div>
  </div>
</div>

<script>
const video = document.getElementById('video');
const analyzeCanvas = document.getElementById('analyzeCanvas');
const artCanvas = document.getElementById('artCanvas');
const ctx = artCanvas.getContext('2d');
const aCtx = analyzeCanvas.getContext('2d');

const AW = 80, AH = 60;
analyzeCanvas.width = AW;
analyzeCanvas.height = AH;

let mode = 'wave';
let running = false;
let frameCount = 0;
let waveHistory = [];
const MAX_WAVE = 300;
let smoothed = new Array(AW).fill(128);

function resize() {
  artCanvas.width = window.innerWidth;
  artCanvas.height = window.innerHeight;
  waveHistory = [];
}
resize();
window.addEventListener('resize', resize);

document.querySelectorAll('.mode-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    mode = btn.dataset.mode;
    waveHistory = [];
    ctx.clearRect(0, 0, artCanvas.width, artCanvas.height);
  });
});

document.getElementById('startBtn').addEventListener('click', async () => {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: { ideal: 'environment' }, width: { ideal: 320 }, height: { ideal: 240 } },
      audio: false
    });
    video.srcObject = stream;
    video.onloadedmetadata = () => {
      video.play().then(() => {
        document.getElementById('startBtn').classList.add('hidden');
        document.getElementById('modeToggle').style.display = 'flex';
        document.getElementById('recDot').style.display = 'block';
        document.getElementById('uiBottom').style.display = 'block';
        running = true;
        requestAnimationFrame(loop);
      });
    };
  } catch(e) {
    const err = document.getElementById('errorMsg');
    err.style.display = 'block';
    err.textContent = 'カメラにアクセスできません\n設定からカメラを許可してください';
  }
});

function getColumnLuminance() {
  aCtx.drawImage(video, 0, 0, AW, AH);
  const data = aCtx.getImageData(0, 0, AW, AH).data;
  const cols = new Array(AW).fill(0);

  for (let x = 0; x < AW; x++) {
    let sum = 0;
    for (let y = 0; y < AH; y++) {
      const i = (y * AW + x) * 4;
      sum += data[i] * 0.299 + data[i+1] * 0.587 + data[i+2] * 0.114;
    }
    cols[x] = sum / AH;
  }

  // Smooth
  for (let x = 0; x < AW; x++) {
    smoothed[x] = smoothed[x] * 0.65 + cols[x] * 0.35;
  }

  let total = 0;
  for (let v of smoothed) total += v;
  const avg = total / AW;

  return { cols: smoothed.slice(), avg };
}

function drawWave(lum) {
  const W = artCanvas.width;
  const H = artCanvas.height;

  ctx.fillStyle = 'rgba(0,0,0,0.05)';
  ctx.fillRect(0, 0, W, H);

  const pts = [];
  for (let i = 0; i < lum.cols.length; i++) {
    const x = (i / (lum.cols.length - 1)) * W;
    const y = H * 0.5 + (lum.avg - lum.cols[i]) * (H / 400);
    pts.push({ x, y });
  }

  waveHistory.push(pts);
  if (waveHistory.length > MAX_WAVE) waveHistory.shift();

  // Ghost waves
  for (let h = 0; h < waveHistory.length - 1; h++) {
    const age = h / waveHistory.length;
    if (age < 0.2) continue;
    const p = waveHistory[h];
    ctx.beginPath();
    ctx.moveTo(p[0].x, p[0].y);
    for (let i = 1; i < p.length; i++) {
      const mx = (p[i-1].x + p[i].x) / 2;
      const my = (p[i-1].y + p[i].y) / 2;
      ctx.quadraticCurveTo(p[i-1].x, p[i-1].y, mx, my);
    }
    ctx.strokeStyle = `rgba(255,255,255,${age * 0.45})`;
    ctx.lineWidth = age * 2.5;
    ctx.stroke();
  }

  // Current wave — bright
  const cur = waveHistory[waveHistory.length - 1];
  ctx.beginPath();
  ctx.moveTo(cur[0].x, cur[0].y);
  for (let i = 1; i < cur.length; i++) {
    const mx = (cur[i-1].x + cur[i].x) / 2;
    const my = (cur[i-1].y + cur[i].y) / 2;
    ctx.quadraticCurveTo(cur[i-1].x, cur[i-1].y, mx, my);
  }
  ctx.strokeStyle = 'rgba(255,255,255,1)';
  ctx.lineWidth = 2.5;
  ctx.shadowBlur = 18;
  ctx.shadowColor = 'rgba(255,255,255,0.9)';
  ctx.stroke();
  ctx.shadowBlur = 0;
}

function drawMountain(lum) {
  const W = artCanvas.width;
  const H = artCanvas.height;

  ctx.fillStyle = 'rgba(0,0,0,0.07)';
  ctx.fillRect(0, 0, W, H);

  const layers = 6;
  for (let l = 0; l < layers; l++) {
    const t = l / layers;
    const baseY = H * 0.58 + l * 22;
    const alpha = 0.08 + t * 0.55;
    const scaleY = 0.22 + t * 0.12;

    ctx.beginPath();
    ctx.moveTo(0, H);

    for (let i = 0; i < lum.cols.length; i++) {
      const x = (i / (lum.cols.length - 1)) * W;
      const v = lum.cols[i] / 255;
      const wave = Math.sin(frameCount * 0.008 + i * 0.18 + l * 1.2) * 5;
      const y = baseY - v * H * scaleY + wave;

      if (i === 0) {
        ctx.moveTo(x, y);
      } else {
        const px = ((i-1) / (lum.cols.length-1)) * W;
        const pv = lum.cols[i-1] / 255;
        const pw = Math.sin(frameCount * 0.008 + (i-1) * 0.18 + l * 1.2) * 5;
        const py = baseY - pv * H * scaleY + pw;
        ctx.quadraticCurveTo(px, py, (px+x)/2, (py+y)/2);
      }
    }
    ctx.lineTo(W, H);
    ctx.lineTo(0, H);
    ctx.closePath();

    const grad = ctx.createLinearGradient(0, baseY - H * scaleY, 0, H);
    grad.addColorStop(0, `rgba(255,255,255,${alpha})`);
    grad.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = grad;
    ctx.fill();
    ctx.strokeStyle = `rgba(255,255,255,${alpha + 0.15})`;
    ctx.lineWidth = 0.8;
    ctx.stroke();
  }
}

function drawScatter(lum) {
  const W = artCanvas.width;
  const H = artCanvas.height;

  ctx.fillStyle = 'rgba(0,0,0,0.04)';
  ctx.fillRect(0, 0, W, H);

  const cx = W / 2, cy = H / 2;
  const n = lum.cols.length;

  for (let i = 0; i < n; i++) {
    const angle = (i / n) * Math.PI * 2 - Math.PI / 2 + frameCount * 0.004;
    const v = lum.cols[i] / 255;
    const r = 50 + v * Math.min(W, H) * 0.32;

    for (let j = 0; j < 4; j++) {
      const jA = angle + (Math.random() - 0.5) * 0.25;
      const jR = r + (Math.random() - 0.5) * 30 * (1 - v);
      const x = cx + Math.cos(jA) * jR;
      const y = cy + Math.sin(jA) * jR;
      ctx.beginPath();
      ctx.arc(x, y, 0.5 + v * 2, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(255,255,255,${v * 0.7})`;
      ctx.fill();
    }
  }

  const glowR = 80 + (lum.avg / 255) * 60;
  const glow = ctx.createRadialGradient(cx, cy, 0, cx, cy, glowR);
  glow.addColorStop(0, `rgba(255,255,255,${lum.avg / 800})`);
  glow.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = glow;
  ctx.beginPath();
  ctx.arc(cx, cy, glowR, 0, Math.PI * 2);
  ctx.fill();
}

function loop() {
  if (!running) return;
  frameCount++;

  try {
    if (video.readyState >= 2) {
      const lum = getColumnLuminance();
      if (mode === 'wave') drawWave(lum);
      else if (mode === 'mountain') drawMountain(lum);
      else drawScatter(lum);
      document.getElementById('luxValue').textContent =
        Math.round(lum.avg).toString().padStart(3, '0');
    }
  } catch(e) {
    console.error(e);
  }

  requestAnimationFrame(loop);
}
</script>
</body>
</html>
