<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WAVEFORM MONITOR</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap');
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background:#0a0a0a; overflow:hidden;
    height:100vh; width:100vw;
    font-family:'Space Mono',monospace;
    color:rgba(255,255,255,0.6);
  }

  #startScreen {
    position:absolute; top:0; left:0; width:100%; height:100%;
    display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    z-index:20; background:#0a0a0a;
  }
  #startBtn {
    background:transparent; border:1px solid rgba(255,255,255,0.35);
    color:white; font-family:'Space Mono',monospace;
    font-size:12px; letter-spacing:0.35em;
    padding:18px 44px; cursor:pointer;
  }
  .start-sub {
    margin-top:12px; font-size:9px;
    letter-spacing:0.25em; color:rgba(255,255,255,0.25);
  }

  #appScreen {
    display:none; width:100%; height:100%; flex-direction:column;
  }

  #previewWrap {
    position:relative; flex:0 0 auto;
    height:32vh; background:#000; overflow:hidden;
  }
  #video { width:100%; height:100%; object-fit:cover; }
  .preview-label {
    position:absolute; top:8px; left:10px;
    font-size:8px; letter-spacing:0.3em; color:rgba(255,255,255,0.4);
  }
  .rec {
    position:absolute; top:10px; left:8px;
    width:5px; height:5px; border-radius:50%;
    background:#ff2020; animation:blink 1.5s ease-in-out infinite;
  }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.15} }

  #scopeWrap {
    flex:1; position:relative; background:#0e0e0e; overflow:hidden;
  }
  #gridCanvas { position:absolute; top:0; left:0; width:100%; height:100%; pointer-events:none; }
  #waveCanvas { position:absolute; top:0; left:0; width:100%; height:100%; }

  .y-labels {
    position:absolute; top:0; left:0; height:100%; width:32px; pointer-events:none;
  }
  .y-label {
    position:absolute; right:4px; font-size:8px;
    color:rgba(255,255,255,0.28); transform:translateY(-50%); letter-spacing:0;
  }

  .mode-row {
    position:absolute; top:8px; right:10px; display:flex; gap:10px;
  }
  .mb {
    background:transparent; border:none;
    color:rgba(255,255,255,0.2); font-family:'Space Mono',monospace;
    font-size:8px; letter-spacing:0.3em; cursor:pointer;
    padding:2px 0; text-transform:uppercase;
    border-bottom:1px solid transparent;
  }
  .mb.active { color:rgba(255,255,255,0.75); border-bottom-color:rgba(255,255,255,0.4); }

  .scope-footer {
    position:absolute; bottom:0; left:0; right:0; height:22px;
    display:flex; align-items:center; padding:0 36px;
    border-top:1px solid rgba(255,255,255,0.06);
  }
  .scope-title { font-size:8px; letter-spacing:0.35em; color:rgba(255,255,255,0.25); }
  .scope-mode { margin-left:auto; font-size:8px; letter-spacing:0.3em; color:rgba(255,255,255,0.18); }
</style>
</head>
<body>

<div id="startScreen">
  <button id="startBtn">▶ START WAVEFORM</button>
  <div class="start-sub">カメラの映像を波形モニターで可視化</div>
</div>

<div id="appScreen">
  <div id="previewWrap">
    <video id="video" autoplay playsinline muted></video>
    <div class="rec"></div>
    <div class="preview-label" style="left:18px">CAMERA INPUT</div>
  </div>
  <div id="scopeWrap">
    <canvas id="gridCanvas"></canvas>
    <canvas id="waveCanvas"></canvas>
    <div class="y-labels" id="yLabels"></div>
    <div class="mode-row">
      <button class="mb active" data-mode="luma">LUMA</button>
      <button class="mb" data-mode="rgb">RGB</button>
      <button class="mb" data-mode="color">COLOR</button>
    </div>
    <div class="scope-footer">
      <span class="scope-title">WAVEFORM MONITOR</span>
      <span class="scope-mode" id="modeLabel">LUMA</span>
    </div>
  </div>
</div>

<canvas id="analyzeCanvas" style="display:none"></canvas>

<script>
const video = document.getElementById('video');
const analyzeCanvas = document.getElementById('analyzeCanvas');
const gridCanvas = document.getElementById('gridCanvas');
const waveCanvas = document.getElementById('waveCanvas');
const gCtx = gridCanvas.getContext('2d');
const wCtx = waveCanvas.getContext('2d');
const aCtx = analyzeCanvas.getContext('2d');

// High resolution analysis — more columns = denser dots
const AW = 200, AH = 120;
analyzeCanvas.width = AW;
analyzeCanvas.height = AH;

let mode = 'luma';
let running = false;

// Per-column smoothed averages
let smoothL = new Array(AW).fill(0);
let smoothR = new Array(AW).fill(0);
let smoothG = new Array(AW).fill(0);
let smoothB = new Array(AW).fill(0);

// All pixel samples per column (for dot scatter)
let colSamples = Array.from({length: AW}, () => []);

const PAD_TOP = 10, PAD_BOT = 26, PAD_L = 32, PAD_R = 6;

function resizeCanvases() {
  const scope = document.getElementById('scopeWrap');
  const W = scope.clientWidth, H = scope.clientHeight;
  gridCanvas.width = W; gridCanvas.height = H;
  waveCanvas.width = W; waveCanvas.height = H;
  buildYLabels(H);
  drawGrid(W, H);
}

function buildYLabels(H) {
  const container = document.getElementById('yLabels');
  container.innerHTML = '';
  const plotH = H - PAD_TOP - PAD_BOT;
  [100, 75, 50, 25, 0].forEach(v => {
    const el = document.createElement('div');
    el.className = 'y-label';
    el.textContent = v;
    el.style.top = (PAD_TOP + (1 - v / 100) * plotH) + 'px';
    container.appendChild(el);
  });
}

function drawGrid(W, H) {
  gCtx.clearRect(0, 0, W, H);
  const plotH = H - PAD_TOP - PAD_BOT;
  gCtx.lineWidth = 1;
  [0, 25, 50, 75, 100].forEach(v => {
    const y = PAD_TOP + (1 - v / 100) * plotH;
    gCtx.strokeStyle = v === 100 ? 'rgba(255,255,255,0.1)' : 'rgba(255,255,255,0.05)';
    gCtx.beginPath();
    gCtx.moveTo(PAD_L, y); gCtx.lineTo(W - PAD_R, y);
    gCtx.stroke();
  });
}

// ---- Analyze ----
function analyze() {
  aCtx.drawImage(video, 0, 0, AW, AH);
  const data = aCtx.getImageData(0, 0, AW, AH).data;

  const newL = new Array(AW).fill(0);
  const newR = new Array(AW).fill(0);
  const newG = new Array(AW).fill(0);
  const newB = new Array(AW).fill(0);
  const newSamples = Array.from({length: AW}, () => []);

  for (let x = 0; x < AW; x++) {
    let sL = 0, sR = 0, sG = 0, sB = 0;
    for (let y = 0; y < AH; y++) {
      const i = (y * AW + x) * 4;
      const r = data[i], g = data[i+1], b = data[i+2];
      const lum = r * 0.299 + g * 0.587 + b * 0.114;
      sL += lum; sR += r; sG += g; sB += b;
      newSamples[x].push({ lum, r, g, b });
    }
    newL[x] = sL / AH;
    newR[x] = sR / AH;
    newG[x] = sG / AH;
    newB[x] = sB / AH;
  }

  const s = 0.68;
  for (let x = 0; x < AW; x++) {
    smoothL[x] = smoothL[x] * s + newL[x] * (1 - s);
    smoothR[x] = smoothR[x] * s + newR[x] * (1 - s);
    smoothG[x] = smoothG[x] * s + newG[x] * (1 - s);
    smoothB[x] = smoothB[x] * s + newB[x] * (1 - s);
    colSamples[x] = newSamples[x];
  }
}

// ---- Draw ----
function drawScope() {
  const W = waveCanvas.width, H = waveCanvas.height;
  const plotW = W - PAD_L - PAD_R;
  const plotH = H - PAD_TOP - PAD_BOT;

  // Slow fade for ghosting trail
  wCtx.fillStyle = 'rgba(14,14,14,0.3)';
  wCtx.fillRect(0, 0, W, H);

  function toY(v255) { return PAD_TOP + (1 - v255 / 255) * plotH; }
  function toX(i) { return PAD_L + (i / (AW - 1)) * plotW; }

  if (mode === 'luma') {
    for (let x = 0; x < AW; x++) {
      const px = toX(x);
      for (const s of colSamples[x]) {
        const py = toY(s.lum);
        const a = 0.08 + (s.lum / 255) * 0.45;
        // Pixel-sized rectangle — sharper and denser than arc
        wCtx.fillStyle = `rgba(210,230,200,${a})`;
        wCtx.fillRect(px - 0.3, py - 0.3, 0.6, 0.6);
      }
      // Bright average dot
      wCtx.fillStyle = 'rgba(255,255,255,0.9)';
      wCtx.fillRect(toX(x) - 0.4, toY(smoothL[x]) - 0.4, 0.8, 0.8);
    }

  } else if (mode === 'rgb') {
    const channels = [
      { data: smoothR, color: [255, 70, 70] },
      { data: smoothG, color: [60, 210, 90] },
      { data: smoothB, color: [70, 130, 255] },
    ];
    for (const ch of channels) {
      const [cr, cg, cb] = ch.color;
      // Scatter dots per sample
      for (let x = 0; x < AW; x++) {
        const px = toX(x);
        for (const s of colSamples[x]) {
          const v = ch === channels[0] ? s.r : ch === channels[1] ? s.g : s.b;
          const py = toY(v);
          const a = 0.06 + (v / 255) * 0.35;
          wCtx.fillStyle = `rgba(${cr},${cg},${cb},${a})`;
          wCtx.fillRect(px - 0.3, py - 0.3, 0.6, 0.6);
        }
        // Bright average
        const avg = ch.data[x];
        wCtx.fillStyle = `rgba(${cr},${cg},${cb},0.9)`;
        wCtx.fillRect(toX(x) - 0.4, toY(avg) - 0.4, 0.8, 0.8);
      }
    }

  } else if (mode === 'color') {
    for (let x = 0; x < AW; x++) {
      const px = toX(x);
      for (const s of colSamples[x]) {
        const py = toY(s.lum);
        const a = 0.12 + (s.lum / 255) * 0.55;
        wCtx.fillStyle = `rgba(${s.r},${s.g},${s.b},${a})`;
        wCtx.fillRect(px - 0.3, py - 0.3, 0.6, 0.6);
      }
    }
  }
}

// ---- Mode toggle ----
document.querySelectorAll('.mb').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.mb').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    mode = btn.dataset.mode;
    document.getElementById('modeLabel').textContent = btn.dataset.mode.toUpperCase();
    wCtx.clearRect(0, 0, waveCanvas.width, waveCanvas.height);
  });
});

// ---- Start ----
document.getElementById('startBtn').addEventListener('click', async () => {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: { ideal: 'environment' }, width: { ideal: 1280 }, height: { ideal: 720 } },
      audio: false
    });
    video.srcObject = stream;
    video.onloadedmetadata = () => {
      video.play().then(() => {
        document.getElementById('startScreen').style.display = 'none';
        document.getElementById('appScreen').style.display = 'flex';
        setTimeout(() => { resizeCanvases(); running = true; requestAnimationFrame(loop); }, 100);
      });
    };
  } catch(e) {
    document.querySelector('.start-sub').textContent = 'カメラを許可してください';
  }
});

window.addEventListener('resize', resizeCanvases);

function loop() {
  if (!running) return;
  try {
    if (video.readyState >= 2) { analyze(); drawScope(); }
  } catch(e) { console.error(e); }
  requestAnimationFrame(loop);
}
</script>
</body>
</html>
