<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WAVEFORM MONITOR</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap');
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#000;overflow:hidden;height:100vh;width:100vw;font-family:'Space Mono',monospace}

  #startScreen{
    position:absolute;top:0;left:0;width:100%;height:100%;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    z-index:20;background:#000;
  }
  #startBtn{
    background:transparent;border:1px solid rgba(255,255,255,0.3);
    color:#fff;font-family:'Space Mono',monospace;
    font-size:11px;letter-spacing:.35em;padding:16px 40px;cursor:pointer;
  }
  .sub{margin-top:10px;font-size:8px;letter-spacing:.3em;color:rgba(255,255,255,.2)}

  #app{display:none;width:100%;height:100%;flex-direction:column}
  #pvWrap{position:relative;flex:0 0 auto;height:30vh;background:#000;overflow:hidden}
  #video{width:100%;height:100%;object-fit:cover}
  .pvLabel{position:absolute;top:8px;left:12px;font-size:8px;letter-spacing:.3em;color:rgba(255,255,255,.35)}
  .rec{position:absolute;top:11px;left:8px;width:5px;height:5px;border-radius:50%;background:#f02020;animation:blink 1.4s ease-in-out infinite}
  @keyframes blink{0%,100%{opacity:1}50%{opacity:.1}}

  #scope{flex:1;position:relative;background:#000;overflow:hidden}
  .hdr{
    position:absolute;top:0;left:0;right:0;height:26px;
    background:#111;border-bottom:1px solid rgba(255,255,255,.07);
    display:flex;align-items:center;padding:0 10px;z-index:5;
  }
  .hdrTitle{font-size:8px;letter-spacing:.28em;color:rgba(255,255,255,.45)}
  .modes{margin-left:auto;display:flex;gap:4px}
  .mb{
    background:transparent;border:none;
    color:rgba(255,255,255,.22);font-family:'Space Mono',monospace;
    font-size:8px;letter-spacing:.28em;cursor:pointer;
    padding:2px 8px;text-transform:uppercase;border-radius:2px;
  }
  .mb.on{color:rgba(255,255,255,.85);background:rgba(255,255,255,.09)}

  /* WebGL canvas fills scope below header */
  #glCanvas{position:absolute;top:26px;left:0;width:100%}
  /* Sharp UI overlay */
  #uiCanvas{position:absolute;top:26px;left:0;pointer-events:none;z-index:3}

  .yAxis{position:absolute;top:26px;left:0;width:34px;pointer-events:none;z-index:4}
  .yL{position:absolute;right:4px;font-size:7px;color:rgba(255,255,255,.3);transform:translateY(-50%)}
  .ftr{
    position:absolute;bottom:0;left:0;right:0;height:18px;
    display:flex;align-items:center;padding:0 10px;
    border-top:1px solid rgba(255,255,255,.06);z-index:4;
  }
  .ftrL{font-size:7px;letter-spacing:.3em;color:rgba(255,255,255,.2)}
  .ftrR{margin-left:auto;font-size:7px;letter-spacing:.2em;color:rgba(255,255,255,.12)}
</style>
</head>
<body>

<div id="startScreen">
  <button id="startBtn">▶ START WAVEFORM</button>
  <div class="sub">FCP · WAVEFORM MONITOR</div>
</div>

<div id="app">
  <div id="pvWrap">
    <video id="video" autoplay playsinline muted></video>
    <div class="rec"></div>
    <div class="pvLabel">CAMERA INPUT</div>
  </div>
  <div id="scope">
    <div class="hdr">
      <span class="hdrTitle" id="hdrTitle">RGB OVERLAY</span>
      <div class="modes">
        <button class="mb" data-m="luma">LUMA</button>
        <button class="mb on" data-m="rgb">RGB</button>
        <button class="mb" data-m="color">COLOR</button>
      </div>
    </div>
    <canvas id="glCanvas"></canvas>
    <canvas id="uiCanvas"></canvas>
    <div class="yAxis" id="yAxis"></div>
    <div class="ftr">
      <span class="ftrL">Rec. 709</span>
      <span class="ftrR" id="fps"></span>
    </div>
  </div>
</div>

<canvas id="ac" style="display:none"></canvas>

<script>
const video = document.getElementById('video');
const ac    = document.getElementById('ac');
const glc   = document.getElementById('glCanvas');
const uic   = document.getElementById('uiCanvas');
const ux    = uic.getContext('2d');
const ax    = ac.getContext('2d', {willReadFrequently:true});

// Analysis resolution
const AW = 320, AH = 200;
ac.width = AW; ac.height = AH;

let mode = 'rgb';
let running = false;
let lastT = performance.now();

const PAD_T = 8, PAD_B = 22, PAD_L = 34, PAD_R = 4;
const HDR = 26;
let W = 0, H = 0, pH = 0, pW = 0;

// Pixel data
const pxR = new Uint8Array(AW * AH);
const pxG = new Uint8Array(AW * AH);
const pxB = new Uint8Array(AW * AH);
const pxL = new Uint8Array(AW * AH);

// ── WebGL setup ──
let gl, prog, feedbackProg;
let posBuf, colorBuf;
// Ping-pong framebuffers for persistence/decay
let fbo0, fbo1, tex0, tex1;
let quadBuf;
let blurProg, compositeProg;

function initGL(){
  gl = glc.getContext('webgl', {
    alpha: false,
    antialias: true,
    premultipliedAlpha: false
  });
  if(!gl){ alert('WebGL not supported'); return false; }

  // ── Point shader: renders waveform dots with soft glow
  const pointVS = `
    attribute vec2 a_pos;   // x: screen X normalized, y: value 0-1
    attribute vec3 a_color;
    uniform vec2 u_res;
    uniform float u_padL, u_padT, u_pW, u_pH;
    varying vec3 v_color;
    void main(){
      float px = u_padL + a_pos.x * u_pW;
      float py = u_padT + (1.0 - a_pos.y) * u_pH;
      vec2 clip = (vec2(px, py) / u_res) * 2.0 - 1.0;
      clip.y = -clip.y;
      gl_Position = vec4(clip, 0.0, 1.0);
      gl_PointSize = 2.5;
      v_color = a_color;
    }
  `;
  const pointFS = `
    precision mediump float;
    varying vec3 v_color;
    void main(){
      // Soft circular point = gaussian glow kernel
      vec2 cxy = 2.0 * gl_PointCoord - 1.0;
      float r = dot(cxy, cxy);
      if(r > 1.0) discard;
      float alpha = exp(-r * 3.0) * 0.9;
      gl_FragColor = vec4(v_color * alpha, alpha);
    }
  `;

  // ── Quad shader: used for decay & composite passes
  const quadVS = `
    attribute vec2 a_pos;
    varying vec2 v_uv;
    void main(){
      v_uv = a_pos * 0.5 + 0.5;
      gl_Position = vec4(a_pos, 0.0, 1.0);
    }
  `;
  // Decay pass: multiply previous frame by decay factor
  const decayFS = `
    precision mediump float;
    uniform sampler2D u_tex;
    uniform float u_decay;
    varying vec2 v_uv;
    void main(){
      vec4 c = texture2D(u_tex, v_uv);
      gl_FragColor = vec4(c.rgb * u_decay, 1.0);
    }
  `;
  // Blur pass: 9-tap gaussian
  const blurFS = `
    precision mediump float;
    uniform sampler2D u_tex;
    uniform vec2 u_dir;
    uniform vec2 u_res;
    varying vec2 v_uv;
    void main(){
      vec2 px = u_dir / u_res;
      vec4 c = vec4(0.0);
      c += texture2D(u_tex, v_uv - px*4.0) * 0.0162;
      c += texture2D(u_tex, v_uv - px*3.0) * 0.0540;
      c += texture2D(u_tex, v_uv - px*2.0) * 0.1216;
      c += texture2D(u_tex, v_uv - px*1.0) * 0.1945;
      c += texture2D(u_tex, v_uv          ) * 0.2270;
      c += texture2D(u_tex, v_uv + px*1.0) * 0.1945;
      c += texture2D(u_tex, v_uv + px*2.0) * 0.1216;
      c += texture2D(u_tex, v_uv + px*3.0) * 0.0540;
      c += texture2D(u_tex, v_uv + px*4.0) * 0.0162;
      gl_FragColor = vec4(c.rgb, 1.0);
    }
  `;
  // Final composite to screen
  const compFS = `
    precision mediump float;
    uniform sampler2D u_tex;
    varying vec2 v_uv;
    void main(){
      gl_FragColor = texture2D(u_tex, v_uv);
    }
  `;

  function makeShader(type, src){
    const s = gl.createShader(type);
    gl.shaderSource(s, src); gl.compileShader(s);
    return s;
  }
  function makeProg(vs, fs){
    const p = gl.createProgram();
    gl.attachShader(p, makeShader(gl.VERTEX_SHADER, vs));
    gl.attachShader(p, makeShader(gl.FRAGMENT_SHADER, fs));
    gl.linkProgram(p);
    return p;
  }

  prog       = makeProg(pointVS, pointFS);
  decayProg  = makeProg(quadVS, decayFS);
  blurProg   = makeProg(quadVS, blurFS);
  compProg   = makeProg(quadVS, compFS);

  // Full-screen quad
  quadBuf = gl.createBuffer();
  gl.bindBuffer(gl.ARRAY_BUFFER, quadBuf);
  gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 1,-1, -1,1, 1,1]), gl.STATIC_DRAW);

  // Point buffers (will be sized per frame)
  posBuf   = gl.createBuffer();
  colorBuf = gl.createBuffer();

  gl.enable(gl.BLEND);
  gl.blendFunc(gl.SRC_ALPHA, gl.ONE); // additive blending = glow accumulation

  return true;
}

function makeTexFBO(w, h){
  const tex = gl.createTexture();
  gl.bindTexture(gl.TEXTURE_2D, tex);
  gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, w, h, 0, gl.RGBA, gl.UNSIGNED_BYTE, null);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.LINEAR);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.LINEAR);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);
  const fbo = gl.createFramebuffer();
  gl.bindFramebuffer(gl.FRAMEBUFFER, fbo);
  gl.framebufferTexture2D(gl.FRAMEBUFFER, gl.COLOR_ATTACHMENT0, gl.TEXTURE_2D, tex, 0);
  gl.bindFramebuffer(gl.FRAMEBUFFER, null);
  return {tex, fbo};
}

let decayProg, compProg;
let fb0, fb1; // ping-pong {tex, fbo}
let fb2; // blur temp

function resizeGL(){
  glc.width  = W; glc.height = H;
  gl.viewport(0, 0, W, H);
  fb0 = makeTexFBO(W, H);
  fb1 = makeTexFBO(W, H);
  fb2 = makeTexFBO(W, H);
}

// Draw full-screen quad with given program & texture
function drawQuad(prog, tex, uniforms){
  gl.useProgram(prog);
  gl.bindBuffer(gl.ARRAY_BUFFER, quadBuf);
  const loc = gl.getAttribLocation(prog, 'a_pos');
  gl.enableVertexAttribArray(loc);
  gl.vertexAttribPointer(loc, 2, gl.FLOAT, false, 0, 0);
  gl.activeTexture(gl.TEXTURE0);
  gl.bindTexture(gl.TEXTURE_2D, tex);
  gl.uniform1i(gl.getUniformLocation(prog, 'u_tex'), 0);
  for(const [k,v] of Object.entries(uniforms)){
    const ul = gl.getUniformLocation(prog, k);
    if(Array.isArray(v)) gl.uniform2f(ul, v[0], v[1]);
    else gl.uniform1f(ul, v);
  }
  gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
}

function scopeW(){ return document.getElementById('scope').clientWidth }
function scopeH(){ return document.getElementById('scope').clientHeight - HDR }

function resize(){
  W = scopeW(); H = scopeH();
  pW = W - PAD_L - PAD_R;
  pH = H - PAD_T - PAD_B;
  uic.width = W; uic.height = H;
  if(gl) resizeGL();
  buildYAxis();
  drawUIGrid();
}

function buildYAxis(){
  const el = document.getElementById('yAxis');
  el.innerHTML = '';
  [100,75,50,25,0].forEach(v => {
    const d = document.createElement('div');
    d.className = 'yL'; d.textContent = v;
    d.style.top = (PAD_T + (1 - v/100) * pH) + 'px';
    el.appendChild(d);
  });
}

function drawUIGrid(){
  ux.clearRect(0,0,W,H);
  ux.lineWidth = 1;
  [0,25,50,75,100].forEach(v => {
    const y = PAD_T + (1 - v/100) * pH;
    ux.strokeStyle = (v===0||v===100) ? 'rgba(255,255,255,.1)' : 'rgba(255,255,255,.05)';
    ux.beginPath(); ux.moveTo(PAD_L,y); ux.lineTo(W-PAD_R,y); ux.stroke();
  });
}

function analyze(){
  ax.drawImage(video, 0, 0, AW, AH);
  const d = ax.getImageData(0, 0, AW, AH).data;
  for(let i = 0; i < AW * AH; i++){
    const b = i*4;
    pxR[i]=d[b]; pxG[i]=d[b+1]; pxB[i]=d[b+2];
    pxL[i] = (d[b]*299 + d[b+1]*587 + d[b+2]*114 + 500) / 1000 | 0;
  }
}

function buildPoints(){
  // Each source pixel → one point: (normalizedX, value0to1, r, g, b)
  const N = AW * AH;
  const pos   = new Float32Array(N * 2);
  const color = new Float32Array(N * 3);
  let k = 0, c = 0;

  for(let col = 0; col < AW; col++){
    const nx = col / (AW - 1); // 0..1 across plot
    for(let row = 0; row < AH; row++){
      const idx = row * AW + col;
      let val, r, g, b;

      if(mode === 'luma'){
        val = pxL[idx] / 255;
        r = 0.75; g = 1.0; b = 0.6;
      } else if(mode === 'rgb'){
        // 3 points per pixel (R, G, B separately)
        // R
        pos[k]=nx; pos[k+1]=pxR[idx]/255; k+=2;
        color[c]=1.0; color[c+1]=0.0; color[c+2]=0.0; c+=3;
        // G
        pos[k]=nx; pos[k+1]=pxG[idx]/255; k+=2;
        color[c]=0.0; color[c+1]=1.0; color[c+2]=0.0; c+=3;
        // B
        pos[k]=nx; pos[k+1]=pxB[idx]/255; k+=2;
        color[c]=0.0; color[c+1]=0.0; color[c+2]=1.0; c+=3;
        continue;
      } else {
        val = pxL[idx] / 255;
        r = pxR[idx]/255; g = pxG[idx]/255; b = pxB[idx]/255;
      }

      pos[k]=nx; pos[k+1]=val; k+=2;
      color[c]=r; color[c+1]=g; color[c+2]=b; c+=3;
    }
  }

  const count = mode === 'rgb' ? N * 3 : N;
  return { pos: pos.slice(0, count*2), color: color.slice(0, count*3), count };
}

function renderFrame(){
  const { pos, color, count } = buildPoints();

  // 1. Decay previous frame into fb1
  gl.disable(gl.BLEND);
  gl.bindFramebuffer(gl.FRAMEBUFFER, fb1.fbo);
  gl.viewport(0, 0, W, H);
  drawQuad(decayProg, fb0.tex, { u_decay: 0.88 });

  // 2. Draw new points ON TOP of decayed frame (additive)
  gl.enable(gl.BLEND);
  gl.blendFunc(gl.SRC_ALPHA, gl.ONE);

  gl.useProgram(prog);
  gl.bindBuffer(gl.ARRAY_BUFFER, posBuf);
  gl.bufferData(gl.ARRAY_BUFFER, pos, gl.DYNAMIC_DRAW);
  const posLoc = gl.getAttribLocation(prog, 'a_pos');
  gl.enableVertexAttribArray(posLoc);
  gl.vertexAttribPointer(posLoc, 2, gl.FLOAT, false, 0, 0);

  gl.bindBuffer(gl.ARRAY_BUFFER, colorBuf);
  gl.bufferData(gl.ARRAY_BUFFER, color, gl.DYNAMIC_DRAW);
  const colLoc = gl.getAttribLocation(prog, 'a_color');
  gl.enableVertexAttribArray(colLoc);
  gl.vertexAttribPointer(colLoc, 3, gl.FLOAT, false, 0, 0);

  gl.uniform2f(gl.getUniformLocation(prog, 'u_res'), W, H);
  gl.uniform1f(gl.getUniformLocation(prog, 'u_padL'), PAD_L);
  gl.uniform1f(gl.getUniformLocation(prog, 'u_padT'), PAD_T);
  gl.uniform1f(gl.getUniformLocation(prog, 'u_pW'), pW);
  gl.uniform1f(gl.getUniformLocation(prog, 'u_pH'), pH);

  gl.drawArrays(gl.POINTS, 0, count);

  // 3. Horizontal blur into fb2
  gl.disable(gl.BLEND);
  gl.bindFramebuffer(gl.FRAMEBUFFER, fb2.fbo);
  drawQuad(blurProg, fb1.tex, { u_dir:[1,0], u_res:[W,H] });

  // 4. Vertical blur back into fb0 (becomes new "previous frame")
  gl.bindFramebuffer(gl.FRAMEBUFFER, fb0.fbo);
  drawQuad(blurProg, fb2.tex, { u_dir:[0,1], u_res:[W,H] });

  // 5. Composite to screen
  gl.bindFramebuffer(gl.FRAMEBUFFER, null);
  gl.viewport(0, 0, W, H);
  gl.clearColor(0,0,0,1); gl.clear(gl.COLOR_BUFFER_BIT);
  drawQuad(compProg, fb0.tex, {});
}

document.querySelectorAll('.mb').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.mb').forEach(b => b.classList.remove('on'));
    btn.classList.add('on');
    mode = btn.dataset.m;
    const t = {luma:'LUMA', rgb:'RGB OVERLAY', color:'COLOR'};
    document.getElementById('hdrTitle').textContent = t[mode];
    // Clear framebuffers
    if(gl){
      [fb0,fb1,fb2].forEach(fb=>{
        gl.bindFramebuffer(gl.FRAMEBUFFER, fb.fbo);
        gl.clearColor(0,0,0,1); gl.clear(gl.COLOR_BUFFER_BIT);
      });
      gl.bindFramebuffer(gl.FRAMEBUFFER, null);
    }
  });
});

document.getElementById('startBtn').addEventListener('click', async () => {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode:{ideal:'environment'}, width:{ideal:1280}, height:{ideal:720} },
      audio: false
    });
    video.srcObject = stream;
    video.onloadedmetadata = () => {
      video.play().then(() => {
        document.getElementById('startScreen').style.display = 'none';
        document.getElementById('app').style.display = 'flex';
        setTimeout(() => {
          if(!initGL()){ return; }
          resize();
          running = true;
          requestAnimationFrame(loop);
        }, 150);
      });
    };
  } catch(e) {
    document.querySelector('.sub').textContent = 'カメラを許可してください';
  }
});

window.addEventListener('resize', () => { resize(); });

function loop(){
  if(!running) return;
  const now = performance.now();
  document.getElementById('fps').textContent = Math.round(1000/(now-lastT)) + ' FPS';
  lastT = now;
  if(video.readyState >= 2){ analyze(); renderFrame(); }
  requestAnimationFrame(loop);
}
</script>
</body>
</html>
