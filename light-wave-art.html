<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>WAVEFORM MONITOR</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap');
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#0d0d0d;overflow:hidden;height:100dvh;width:100vw;font-family:'Space Mono',monospace;display:flex;flex-direction:column;align-items:center}

  #startScreen{
    position:absolute;inset:0;display:flex;flex-direction:column;
    align-items:center;justify-content:center;z-index:20;background:#0d0d0d;
  }
  #startBtn{
    background:transparent;border:1px solid rgba(255,255,255,.28);
    color:#fff;font-family:'Space Mono',monospace;
    font-size:11px;letter-spacing:.35em;padding:16px 40px;cursor:pointer;
  }
  .sub{margin-top:10px;font-size:8px;letter-spacing:.3em;color:rgba(255,255,255,.2)}

  #app{display:none;width:100%;flex-direction:column;align-items:center}

  /* 16:9 preview */
  #pvWrap{
    position:relative;width:100%;
    /* padding-top:56.25% = 16:9 */
    padding-top:56.25%;
    background:#000;overflow:hidden;flex-shrink:0;
  }
  #video{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
  .pvLabel{position:absolute;top:8px;left:12px;font-size:8px;letter-spacing:.3em;color:rgba(255,255,255,.35);z-index:2}
  .rec{position:absolute;top:11px;left:8px;width:5px;height:5px;border-radius:50%;
    background:#f02020;animation:blink 1.4s ease-in-out infinite;z-index:2}
  @keyframes blink{0%,100%{opacity:1}50%{opacity:.1}}

  /* 16:9 scope */
  #scopeWrap{
    position:relative;width:100%;
    padding-top:56.25%;
    flex-shrink:0;
  }
  #scope{position:absolute;inset:0;background:#0d0d0d;overflow:hidden}

  .hdr{
    position:absolute;top:0;left:0;right:0;height:26px;
    background:#1a1a1a;border-bottom:1px solid rgba(255,255,255,.07);
    display:flex;align-items:center;padding:0 10px;z-index:5;
  }
  .hdrTitle{font-size:8px;letter-spacing:.28em;color:rgba(255,255,255,.45)}
  .modes{margin-left:auto;display:flex;gap:4px}
  .mb{
    background:transparent;border:none;
    color:rgba(255,255,255,.22);font-family:'Space Mono',monospace;
    font-size:8px;letter-spacing:.28em;cursor:pointer;
    padding:2px 8px;text-transform:uppercase;border-radius:2px;
  }
  .mb.on{color:rgba(255,255,255,.85);background:rgba(255,255,255,.09)}

  #gc,#wc{position:absolute;top:26px;left:0;image-rendering:pixelated}

  .yAxis{position:absolute;top:26px;left:0;width:34px;pointer-events:none;z-index:3}
  .yL{position:absolute;right:4px;font-size:7px;color:rgba(255,255,255,.28);transform:translateY(-50%)}

  .ftr{
    position:absolute;bottom:0;left:0;right:0;height:18px;
    display:flex;align-items:center;padding:0 10px;
    border-top:1px solid rgba(255,255,255,.05);z-index:3;
  }
  .ftrL{font-size:7px;letter-spacing:.3em;color:rgba(255,255,255,.18)}
  .ftrR{margin-left:auto;font-size:7px;letter-spacing:.2em;color:rgba(255,255,255,.12)}

  /* Controls panel — fills remaining space */
  #controls{
    width:100%;flex:1;min-height:0;
    background:#111;
    display:flex;flex-direction:column;
    padding:14px 20px 20px;
    border-top:1px solid rgba(255,255,255,.06);
    overflow:hidden;
  }
  .ctrl-row{display:flex;align-items:center;gap:12px;margin-bottom:10px}
  .ctrl-label{font-size:8px;letter-spacing:.3em;color:rgba(255,255,255,.35);width:52px;flex-shrink:0}
  .ctrl-val{font-size:9px;letter-spacing:.15em;color:rgba(255,255,255,.55);width:32px;text-align:right;flex-shrink:0}
  input[type=range]{
    flex:1;-webkit-appearance:none;appearance:none;
    height:2px;background:rgba(255,255,255,.15);border-radius:1px;outline:none;
  }
  input[type=range]::-webkit-slider-thumb{
    -webkit-appearance:none;width:16px;height:16px;
    border-radius:50%;background:rgba(255,255,255,.7);cursor:pointer;
  }
  .ctrl-title{font-size:7px;letter-spacing:.35em;color:rgba(255,255,255,.2);margin-bottom:10px}
</style>
</head>
<body>

<div id="startScreen">
  <button id="startBtn">▶ START WAVEFORM</button>
  <div class="sub">FCP · RGB OVERLAY WAVEFORM MONITOR</div>
</div>

<div id="app">
  <!-- 16:9 camera preview -->
  <div id="pvWrap">
    <video id="video" autoplay playsinline muted></video>
    <div class="rec"></div>
    <div class="pvLabel">CAMERA INPUT</div>
  </div>

  <!-- 16:9 waveform scope -->
  <div id="scopeWrap">
    <div id="scope">
      <div class="hdr">
        <span class="hdrTitle" id="hdrTitle">RGB OVERLAY</span>
        <div class="modes">
          <button class="mb" data-m="luma">LUMA</button>
          <button class="mb on" data-m="rgb">RGB</button>
          <button class="mb" data-m="color">COLOR</button>
        </div>
      </div>
      <canvas id="gc"></canvas>
      <canvas id="wc"></canvas>
      <div class="yAxis" id="yAxis"></div>
      <div class="ftr">
        <span class="ftrL">Rec. 709</span>
        <span class="ftrR" id="fps"></span>
      </div>
    </div>
  </div>

  <!-- Controls — remaining space -->
  <div id="controls">
    <div class="ctrl-title">OUTPUT CONTROLS</div>
    <div class="ctrl-row">
      <span class="ctrl-label">GAIN</span>
      <input type="range" id="gainSlider" min="50" max="500" value="160" step="5">
      <span class="ctrl-val" id="gainVal">160</span>
    </div>
    <div class="ctrl-row">
      <span class="ctrl-label">DECAY</span>
      <input type="range" id="decaySlider" min="0" max="98" value="72" step="1">
      <span class="ctrl-val" id="decayVal">0.72</span>
    </div>
  </div>
</div>

<canvas id="ac" style="display:none"></canvas>

<script>
const video = document.getElementById('video');
const ac    = document.getElementById('ac');
const gc    = document.getElementById('gc');
const wc    = document.getElementById('wc');
const gx    = gc.getContext('2d');
const wx    = wc.getContext('2d');
const ax    = ac.getContext('2d', {willReadFrequently:true});

// ── Parameters (live-adjustable) ──────────────────────────
const AH = 240;  // vertical sample count
let GAIN_NUMER = 160;
let DECAY = 0.72;

const PAD_T=8, PAD_B=22, PAD_L=34, PAD_R=4, HDR=26;

let mode='rgb', running=false, lastT=performance.now();
let W=0, H=0, pW=0, pH=0, AW=1;
let pxR, pxG, pxB, pxL;
let densR, densG, densB;
let persR, persG, persB;

// ── Sliders ───────────────────────────────────────────────
document.getElementById('gainSlider').addEventListener('input', function(){
  GAIN_NUMER = +this.value;
  document.getElementById('gainVal').textContent = this.value;
  if(persR){ persR.fill(0); persG.fill(0); persB.fill(0); }
});
document.getElementById('decaySlider').addEventListener('input', function(){
  DECAY = this.value / 100;
  document.getElementById('decayVal').textContent = DECAY.toFixed(2);
  if(persR){ persR.fill(0); persG.fill(0); persB.fill(0); }
});

// ── Resize: scope fills its absolute container ────────────
function resize(){
  const scopeEl = document.getElementById('scope');
  W = scopeEl.clientWidth;
  H = scopeEl.clientHeight - HDR;
  if(W<=0||H<=0) return;
  pW = W - PAD_L - PAD_R;
  pH = H - PAD_T - PAD_B;

  gc.width=W; gc.height=H;
  wc.width=W; wc.height=H;
  gc.style.width=W+'px'; gc.style.height=H+'px';
  wc.style.width=W+'px'; wc.style.height=H+'px';

  AW = pW;
  ac.width=AW; ac.height=AH;

  const sz = W*H;
  pxR=new Uint8Array(AW*AH); pxG=new Uint8Array(AW*AH);
  pxB=new Uint8Array(AW*AH); pxL=new Uint8Array(AW*AH);
  densR=new Float32Array(sz); densG=new Float32Array(sz); densB=new Float32Array(sz);
  persR=new Float32Array(sz); persG=new Float32Array(sz); persB=new Float32Array(sz);

  buildYAxis(); drawGrid();
}

function buildYAxis(){
  const el=document.getElementById('yAxis');
  el.innerHTML='';
  [100,75,50,25,0].forEach(v=>{
    const d=document.createElement('div');
    d.className='yL'; d.textContent=v;
    d.style.top=(PAD_T+(1-v/100)*pH)+'px';
    el.appendChild(d);
  });
}

function drawGrid(){
  gx.clearRect(0,0,W,H);
  gx.lineWidth=1;
  [0,25,50,75,100].forEach(v=>{
    const y=PAD_T+(1-v/100)*pH;
    gx.strokeStyle=(v===0||v===100)?'rgba(255,255,255,.1)':'rgba(255,255,255,.05)';
    gx.beginPath(); gx.moveTo(PAD_L,y); gx.lineTo(W-PAD_R,y); gx.stroke();
  });
}

function analyze(){
  ax.drawImage(video,0,0,AW,AH);
  const d=ax.getImageData(0,0,AW,AH).data;
  for(let i=0;i<AW*AH;i++){
    const b=i*4;
    pxR[i]=d[b]; pxG[i]=d[b+1]; pxB[i]=d[b+2];
    pxL[i]=(d[b]*299+d[b+1]*587+d[b+2]*114+500)/1000|0;
  }
}

function buildDensity(){
  densR.fill(0); densG.fill(0); densB.fill(0);
  for(let col=0;col<AW;col++){
    const outX=PAD_L+col;
    if(outX<0||outX>=W) continue;
    for(let row=0;row<AH;row++){
      const idx=row*AW+col;
      if(mode==='luma'){
        const v=pxL[idx];
        const outY=Math.round(PAD_T+(1-v/255)*pH);
        if(outY>=0&&outY<H){
          const i=outY*W+outX;
          densR[i]+=0.75; densG[i]+=1.0; densB[i]+=0.55;
        }
      } else if(mode==='rgb'){
        let y; 
        y=Math.round(PAD_T+(1-pxR[idx]/255)*pH); if(y>=0&&y<H) densR[y*W+outX]+=1.0;
        y=Math.round(PAD_T+(1-pxG[idx]/255)*pH); if(y>=0&&y<H) densG[y*W+outX]+=1.0;
        y=Math.round(PAD_T+(1-pxB[idx]/255)*pH); if(y>=0&&y<H) densB[y*W+outX]+=1.0;
      } else {
        const v=pxL[idx];
        const outY=Math.round(PAD_T+(1-v/255)*pH);
        if(outY>=0&&outY<H){
          const i=outY*W+outX;
          densR[i]+=pxR[idx]/255; densG[i]+=pxG[idx]/255; densB[i]+=pxB[idx]/255;
        }
      }
    }
  }
}

function drawScope(){
  if(!persR||W===0||H===0) return;
  const GAIN = GAIN_NUMER / AH;
  const sz=W*H;

  // Allocate fresh ImageData — do NOT use getImageData (slow & wrong)
  const imgData = new ImageData(W, H);
  const buf = imgData.data;

  for(let i=0;i<sz;i++){
    persR[i]=persR[i]*DECAY+densR[i]*GAIN;
    persG[i]=persG[i]*DECAY+densG[i]*GAIN;
    persB[i]=persB[i]*DECAY+densB[i]*GAIN;
    const b=i*4;
    buf[b]  =persR[i]>255?255:persR[i];
    buf[b+1]=persG[i]>255?255:persG[i];
    buf[b+2]=persB[i]>255?255:persB[i];
    buf[b+3]=255;
  }
  wx.putImageData(imgData,0,0);
}

document.querySelectorAll('.mb').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.mb').forEach(b=>b.classList.remove('on'));
    btn.classList.add('on');
    mode=btn.dataset.m;
    document.getElementById('hdrTitle').textContent={luma:'LUMA',rgb:'RGB OVERLAY',color:'COLOR'}[mode];
    if(persR){ persR.fill(0); persG.fill(0); persB.fill(0); }
  });
});

document.getElementById('startBtn').addEventListener('click',async()=>{
  try{
    const stream=await navigator.mediaDevices.getUserMedia({
      video:{facingMode:{ideal:'environment'},width:{ideal:1920},height:{ideal:1080}},
      audio:false
    });
    video.srcObject=stream;
    video.onloadedmetadata=()=>{
      video.play().then(()=>{
        document.getElementById('startScreen').style.display='none';
        document.getElementById('app').style.display='flex';
        // Wait for layout, then resize
        requestAnimationFrame(()=>requestAnimationFrame(()=>{ resize(); running=true; requestAnimationFrame(loop); }));
      });
    };
  } catch(e){
    document.querySelector('.sub').textContent='カメラを許可してください';
  }
});

window.addEventListener('resize',()=>{ resize(); });

function loop(){
  if(!running) return;
  const now=performance.now();
  document.getElementById('fps').textContent=Math.round(1000/(now-lastT))+' FPS';
  lastT=now;
  if(video.readyState>=2){ analyze(); buildDensity(); drawScope(); }
  requestAnimationFrame(loop);
}
</script>
</body>
</html>
