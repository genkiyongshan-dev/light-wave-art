<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LIGHT WAVE</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap');
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#000; overflow:hidden; height:100vh; width:100vw; }
  #video { position:absolute; width:1px; height:1px; opacity:0.001; pointer-events:none; }
  #analyzeCanvas { display:none; }
  #artCanvas { position:absolute; top:0; left:0; width:100%; height:100%; }

  #startBtn {
    position:absolute; top:50%; left:50%;
    transform:translate(-50%,-50%);
    background:transparent;
    border:1px solid rgba(255,255,255,0.35);
    color:white;
    font-family:'Space Mono',monospace;
    font-size:12px; letter-spacing:0.35em;
    padding:18px 44px; cursor:pointer; z-index:20;
  }
  #startBtn.hidden { display:none; }

  .ui {
    position:absolute; bottom:28px; left:24px;
    font-family:'Space Mono',monospace;
    display:none; z-index:10;
  }
  .ui-label { font-size:8px; letter-spacing:0.4em; color:rgba(255,255,255,0.25); margin-bottom:3px; }
  .ui-val { font-size:26px; font-weight:700; color:rgba(255,255,255,0.85); line-height:1; }
  .ui-unit { font-size:8px; letter-spacing:0.35em; color:rgba(255,255,255,0.18); margin-top:2px; }

  .mode-toggle {
    position:absolute; top:24px; left:24px;
    font-family:'Space Mono',monospace;
    display:none; gap:18px; z-index:10;
  }
  .mb {
    background:transparent; border:none;
    color:rgba(255,255,255,0.22); font-family:'Space Mono',monospace;
    font-size:9px; letter-spacing:0.32em; cursor:pointer;
    padding:3px 0; text-transform:uppercase;
    border-bottom:1px solid transparent; transition:color 0.2s;
  }
  .mb.active { color:rgba(255,255,255,0.8); border-bottom-color:rgba(255,255,255,0.4); }

  .rec {
    position:absolute; top:30px; right:24px;
    width:6px; height:6px; border-radius:50%;
    background:#ff2020; display:none; z-index:10;
    animation:blink 1.5s ease-in-out infinite;
  }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.1} }
</style>
</head>
<body>
<div id="main">
  <video id="video" autoplay playsinline muted></video>
  <canvas id="analyzeCanvas"></canvas>
  <canvas id="artCanvas"></canvas>
  <button id="startBtn">▶ CAMERA START</button>

  <div class="mode-toggle" id="mt">
    <button class="mb active" data-mode="trace">TRACE</button>
    <button class="mb" data-mode="radial">RADIAL</button>
    <button class="mb" data-mode="field">FIELD</button>
  </div>

  <div class="rec" id="rec"></div>

  <div class="ui" id="ui">
    <div class="ui-label">LIGHT INTENSITY</div>
    <div class="ui-val" id="lv">000</div>
    <div class="ui-unit">LUMINANCE</div>
  </div>
</div>

<script>
const video = document.getElementById('video');
const analyzeCanvas = document.getElementById('analyzeCanvas');
const artCanvas = document.getElementById('artCanvas');
const ctx = artCanvas.getContext('2d');
const aCtx = analyzeCanvas.getContext('2d');

const AW = 64, AH = 48;
analyzeCanvas.width = AW;
analyzeCanvas.height = AH;

let mode = 'trace';
let running = false;
let frame = 0;

// Raw luminance grid (AW x AH)
let grid = new Array(AW * AH).fill(0);
let smoothGrid = new Array(AW * AH).fill(0);
// Column averages
let cols = new Array(AW).fill(128);
let smoothCols = new Array(AW).fill(128);
let avgLum = 128;

// Particle system for TRACE mode
const PARTICLES = 180;
let particles = [];

function resize() {
  artCanvas.width = window.innerWidth;
  artCanvas.height = window.innerHeight;
  initParticles();
}
resize();
window.addEventListener('resize', resize);

function initParticles() {
  particles = [];
  for (let i = 0; i < PARTICLES; i++) {
    particles.push(newParticle(true));
  }
}

function newParticle(rand = false) {
  const W = artCanvas.width, H = artCanvas.height;
  return {
    x: rand ? Math.random() * W : W * 0.5 + (Math.random() - 0.5) * W * 0.3,
    y: rand ? Math.random() * H : H * 0.5 + (Math.random() - 0.5) * H * 0.3,
    vx: (Math.random() - 0.5) * 0.8,
    vy: (Math.random() - 0.5) * 0.8,
    life: Math.random(),
    maxLife: 0.6 + Math.random() * 2.5,
    age: 0,
    thickness: 0.2 + Math.random() * 0.6,
    trail: [],
    trailMax: 18 + Math.floor(Math.random() * 30),
    col: Math.floor(Math.random() * AW),
  };
}

// ---- Camera analysis ----
function analyze() {
  aCtx.drawImage(video, 0, 0, AW, AH);
  const data = aCtx.getImageData(0, 0, AW, AH).data;

  for (let x = 0; x < AW; x++) {
    let sum = 0;
    for (let y = 0; y < AH; y++) {
      const i = (y * AW + x) * 4;
      const lum = data[i] * 0.299 + data[i+1] * 0.587 + data[i+2] * 0.114;
      grid[y * AW + x] = lum;
      sum += lum;
    }
    cols[x] = sum / AH;
  }

  for (let i = 0; i < AW * AH; i++) {
    smoothGrid[i] = smoothGrid[i] * 0.75 + grid[i] * 0.25;
  }
  for (let x = 0; x < AW; x++) {
    smoothCols[x] = smoothCols[x] * 0.7 + cols[x] * 0.3;
  }

  let t = 0;
  for (let v of smoothCols) t += v;
  avgLum = t / AW;
}

function sampleGrid(nx, ny) {
  // nx, ny in 0..1
  const x = Math.floor(nx * (AW - 1));
  const y = Math.floor(ny * (AH - 1));
  return smoothGrid[Math.max(0, Math.min(AH-1,y)) * AW + Math.max(0, Math.min(AW-1,x))] / 255;
}

// ---- TRACE mode ----
// Particles flow along luminance gradient — diverse, thin, organic
function drawTrace() {
  const W = artCanvas.width, H = artCanvas.height;

  // Very slow fade — keeps trails but doesn't blast white
  ctx.fillStyle = 'rgba(0,0,0,0.018)';
  ctx.fillRect(0, 0, W, H);

  const intensity = avgLum / 255;

  for (let p of particles) {
    p.age += 0.012 + intensity * 0.015;

    // Sample luminance at particle position
    const nx = p.x / W, ny = p.y / H;
    const lum = sampleGrid(nx, ny);

    // Gradient: nudge toward brighter area
    const dx = 1 / AW, dy = 1 / AH;
    const gx = sampleGrid(Math.min(1, nx + dx), ny) - sampleGrid(Math.max(0, nx - dx), ny);
    const gy = sampleGrid(nx, Math.min(1, ny + dy)) - sampleGrid(nx, Math.max(0, ny - dy));

    // Unique per-particle curl + gradient flow
    const angle = frame * 0.003 + p.col * 0.15;
    const curl = 0.4;
    p.vx += gx * 1.8 + Math.cos(angle + ny * 4) * curl * 0.3;
    p.vy += gy * 1.8 + Math.sin(angle + nx * 4) * curl * 0.3;

    // Damping
    p.vx *= 0.88;
    p.vy *= 0.88;

    // Speed cap
    const spd = Math.sqrt(p.vx * p.vx + p.vy * p.vy);
    if (spd > 3.5) { p.vx *= 3.5 / spd; p.vy *= 3.5 / spd; }

    p.x += p.vx;
    p.y += p.vy;

    // Record trail
    p.trail.push({ x: p.x, y: p.y, lum });
    if (p.trail.length > p.trailMax) p.trail.shift();

    // Draw trail as thin line
    if (p.trail.length > 2) {
      for (let t = 1; t < p.trail.length; t++) {
        const ta = t / p.trail.length;
        const a = ta * lum * 0.55;
        if (a < 0.005) continue;
        ctx.beginPath();
        ctx.moveTo(p.trail[t-1].x, p.trail[t-1].y);
        ctx.lineTo(p.trail[t].x, p.trail[t].y);
        ctx.strokeStyle = `rgba(255,255,255,${a})`;
        ctx.lineWidth = p.thickness * ta;
        ctx.stroke();
      }
    }

    // Respawn if out of bounds or aged out
    if (p.x < -10 || p.x > W + 10 || p.y < -10 || p.y > H + 10 || p.age > p.maxLife) {
      const np = newParticle(false);
      Object.assign(p, np);
    }
  }
}

// ---- RADIAL mode ----
// Light intensity mapped to radial lines from center — like a sonar
function drawRadial() {
  const W = artCanvas.width, H = artCanvas.height;
  const cx = W / 2, cy = H / 2;

  ctx.fillStyle = 'rgba(0,0,0,0.04)';
  ctx.fillRect(0, 0, W, H);

  const n = AW;
  const baseR = Math.min(W, H) * 0.06;
  const maxR = Math.min(W, H) * 0.46;

  // Draw multiple rings at different "time" offsets
  const rings = 8;
  for (let ring = 0; ring < rings; ring++) {
    const timeOffset = (frame - ring * 12) * 0.001;
    if (timeOffset < 0) continue;
    const ringAge = (ring / rings);
    const alpha = (1 - ringAge) * 0.18;
    const lineW = (1 - ringAge) * 0.8;

    ctx.beginPath();
    for (let i = 0; i <= n; i++) {
      const idx = i % n;
      const angle = (idx / n) * Math.PI * 2 - Math.PI / 2;
      const v = smoothCols[idx] / 255;
      const r = baseR + v * maxR * (0.5 + 0.5 * Math.sin(timeOffset + idx * 0.3));
      const x = cx + Math.cos(angle) * r;
      const y = cy + Math.sin(angle) * r;
      if (i === 0) ctx.moveTo(x, y);
      else {
        const pa = ((idx - 1 + n) % n / n) * Math.PI * 2 - Math.PI / 2;
        const pv = smoothCols[(idx - 1 + n) % n] / 255;
        const pr = baseR + pv * maxR * (0.5 + 0.5 * Math.sin(timeOffset + (idx-1) * 0.3));
        const px = cx + Math.cos(pa) * pr;
        const py = cy + Math.sin(pa) * pr;
        const mx = (px + x) / 2, my = (py + y) / 2;
        ctx.quadraticCurveTo(px, py, mx, my);
      }
    }
    ctx.closePath();
    ctx.strokeStyle = `rgba(255,255,255,${alpha})`;
    ctx.lineWidth = lineW;
    ctx.stroke();
  }

  // Current ring — bright
  ctx.beginPath();
  for (let i = 0; i <= n; i++) {
    const idx = i % n;
    const angle = (idx / n) * Math.PI * 2 - Math.PI / 2;
    const v = smoothCols[idx] / 255;
    const r = baseR + v * maxR;
    const x = cx + Math.cos(angle) * r;
    const y = cy + Math.sin(angle) * r;
    if (i === 0) ctx.moveTo(x, y);
    else {
      const pa = ((idx-1+n)%n/n)*Math.PI*2 - Math.PI/2;
      const pv = smoothCols[(idx-1+n)%n]/255;
      const pr = baseR + pv * maxR;
      const px = cx + Math.cos(pa)*pr;
      const py = cy + Math.sin(pa)*pr;
      ctx.quadraticCurveTo(px, py, (px+x)/2, (py+y)/2);
    }
  }
  ctx.closePath();
  ctx.strokeStyle = `rgba(255,255,255,0.75)`;
  ctx.lineWidth = 0.7;
  ctx.shadowBlur = 6;
  ctx.shadowColor = 'rgba(255,255,255,0.5)';
  ctx.stroke();
  ctx.shadowBlur = 0;
}

// ---- FIELD mode ----
// Vector field — each grid cell shows flow direction based on brightness
function drawField() {
  const W = artCanvas.width, H = artCanvas.height;

  ctx.fillStyle = 'rgba(0,0,0,0.035)';
  ctx.fillRect(0, 0, W, H);

  const GX = 28, GY = 20;
  const cellW = W / GX, cellH = H / GY;

  for (let gy = 0; gy < GY; gy++) {
    for (let gx = 0; gx < GX; gx++) {
      const nx = gx / GX, ny = gy / GY;
      const lum = sampleGrid(nx + 0.5/GX, ny + 0.5/GY);

      // Gradient direction
      const dx2 = 1 / GX, dy2 = 1 / GY;
      const gradX = sampleGrid(Math.min(1,nx+dx2), ny) - sampleGrid(Math.max(0,nx-dx2), ny);
      const gradY = sampleGrid(nx, Math.min(1,ny+dy2)) - sampleGrid(nx, Math.max(0,ny-dy2));

      const cx2 = (gx + 0.5) * cellW;
      const cy2 = (gy + 0.5) * cellH;

      const angle = Math.atan2(gradY, gradX) + frame * 0.004 + gx * 0.08 + gy * 0.08;
      const len = (cellW * 0.35) * (0.2 + lum * 0.8);
      const alpha = 0.08 + lum * 0.35;

      const ex = cx2 + Math.cos(angle) * len;
      const ey = cy2 + Math.sin(angle) * len;

      ctx.beginPath();
      ctx.moveTo(cx2, cy2);
      ctx.lineTo(ex, ey);
      ctx.strokeStyle = `rgba(255,255,255,${alpha})`;
      ctx.lineWidth = 0.5 + lum * 0.6;
      ctx.stroke();

      // Tiny dot at tail
      ctx.beginPath();
      ctx.arc(cx2, cy2, 0.6, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(255,255,255,${alpha * 0.5})`;
      ctx.fill();
    }
  }
}

// ---- MODE BUTTONS ----
document.querySelectorAll('.mb').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.mb').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    mode = btn.dataset.mode;
    ctx.clearRect(0, 0, artCanvas.width, artCanvas.height);
    initParticles();
  });
});

// ---- START ----
document.getElementById('startBtn').addEventListener('click', async () => {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: { ideal: 'environment' }, width: { ideal: 320 }, height: { ideal: 240 } },
      audio: false
    });
    video.srcObject = stream;
    video.onloadedmetadata = () => {
      video.play().then(() => {
        document.getElementById('startBtn').classList.add('hidden');
        document.getElementById('mt').style.display = 'flex';
        document.getElementById('rec').style.display = 'block';
        document.getElementById('ui').style.display = 'block';
        running = true;
        requestAnimationFrame(loop);
      });
    };
  } catch(e) {
    document.getElementById('startBtn').textContent = 'カメラを許可してください';
  }
});

// ---- MAIN LOOP ----
function loop() {
  if (!running) return;
  frame++;

  try {
    if (video.readyState >= 2) {
      analyze();
      if (mode === 'trace') drawTrace();
      else if (mode === 'radial') drawRadial();
      else drawField();
      document.getElementById('lv').textContent = Math.round(avgLum).toString().padStart(3,'0');
    }
  } catch(e) { console.error(e); }

  requestAnimationFrame(loop);
}
</script>
</body>
</html>
